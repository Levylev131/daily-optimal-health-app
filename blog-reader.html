<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Feed — Daily Optimal Health</title>
  <style>
    :root {
      --bg:       #0f0f0f;
      --surface:  #161616;
      --surface2: #1e1e1e;
      --border:   #272727;
      --text:     #e8e8e8;
      --muted:    #666;
      --acc:      #22c55e;
      --acc2:     #16a34a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── HEADER ── */
    #header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    #header a { color: var(--muted); text-decoration: none; font-size: .82rem; white-space: nowrap; }
    #header a:hover { color: var(--text); }
    .header-sep { color: var(--border); }
    .header-title { font-size: .95rem; font-weight: 700; }
    .header-spacer { flex: 1; }
    #header-profile { font-size: .78rem; color: var(--muted); }
    .swap-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: .78rem; font-weight: 700; padding: 5px 12px; border-radius: 7px; text-decoration: none; white-space: nowrap; transition: border-color .1s, color .1s; }
    .swap-btn:hover { border-color: var(--acc); color: var(--acc); }

    /* ── TOOLBAR ── */
    #toolbar {
      position: sticky; top: 48px; z-index: 90;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    #new-btn {
      background: var(--acc); color: #000; border: none;
      padding: 6px 14px; border-radius: 8px; font-weight: 800;
      font-size: .8rem; cursor: pointer; white-space: nowrap;
      transition: background .1s;
    }
    #new-btn:hover { background: var(--acc2); }
    #search {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 6px 12px; border-radius: 8px;
      font-size: .8rem; outline: none; width: 200px;
    }
    #search:focus { border-color: var(--acc); }
    #search::placeholder { color: var(--muted); }
    .filter-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: .7rem; font-weight: 700;
      padding: 5px 10px; border-radius: 6px; cursor: pointer;
      transition: background .1s, color .1s, border-color .1s;
    }
    .filter-btn.on { background: var(--surface2); border-color: var(--acc); color: var(--acc); }
    #post-count { font-size: .75rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

    /* ── GRID ── */
    #feed {
      padding: 20px 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      align-content: start;
      min-height: calc(100vh - 96px);
    }

    /* ── CARD ── */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: border-color .15s, transform .15s, box-shadow .15s;
      display: flex; flex-direction: column; gap: 10px;
    }
    .post-card:hover {
      border-color: #3a3a3a;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,.45);
    }

    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { font-size: .63rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: .03em; }
    .badge-draft     { background: #2a2200; color: #f59e0b; }
    .badge-published { background: #001a0a; color: #22c55e; }
    .badge-private   { background: #1a0a2a; color: #a78bfa; }
    .badge-public    { background: #0a1020; color: #60a5fa; }

    .card-title {
      font-size: 1.05rem; font-weight: 700; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-excerpt {
      font-size: .78rem; color: var(--muted); line-height: 1.55; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-meta { display: flex; gap: 6px; align-items: center; font-size: .7rem; color: var(--muted); flex-wrap: wrap; }
    .card-meta-dot { color: #333; }
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag { font-size: .65rem; padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    /* ── EMPTY ── */
    #empty-state {
      grid-column: 1 / -1;
      padding: 80px 20px; text-align: center; color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    #empty-state p { font-size: .85rem; line-height: 1.7; }
    #empty-state a { color: var(--acc); text-decoration: none; }
    #empty-state a:hover { text-decoration: underline; }

    /* ── READER OVERLAY ── */
    #reader {
      position: fixed; inset: 0; z-index: 300;
      background: var(--bg);
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
    }
    #reader.open { transform: translateY(0); }

    #reader-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    #reader-back {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: .78rem; font-weight: 600;
      padding: 5px 12px; border-radius: 7px; cursor: pointer;
      transition: border-color .1s, color .1s;
    }
    #reader-back:hover { border-color: var(--text); color: var(--text); }
    .reader-bar-spacer { flex: 1; }
    #reader-edit {
      background: var(--acc); color: #000; border: none;
      font-size: .78rem; font-weight: 800;
      padding: 6px 16px; border-radius: 8px; cursor: pointer;
      transition: background .1s;
    }
    #reader-edit:hover { background: var(--acc2); }

    #reader-scroll { flex: 1; overflow-y: auto; }
    #reader-scroll::-webkit-scrollbar { width: 4px; }
    #reader-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #reader-content { max-width: 680px; margin: 0 auto; padding: 44px 24px 80px; }

    #reader-title {
      font-size: 2.1rem; font-weight: 800; line-height: 1.2;
      margin-bottom: 14px; font-family: Georgia, serif;
    }
    #reader-meta {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      font-size: .8rem; color: var(--muted); margin-bottom: 10px;
    }
    #reader-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 32px; }
    #reader-tags .tag { font-size: .7rem; }
    #reader-divider { border: none; border-top: 1px solid var(--border); margin-bottom: 36px; }

    #reader-body {
      font-size: 1rem; line-height: 1.85;
      font-family: Georgia, 'Times New Roman', serif;
      color: #d0d0d0;
    }
    #reader-body h1 { font-size: 1.7rem; font-weight: 800; margin: 1.4em 0 .4em; line-height: 1.2; color: var(--text); font-family: Georgia, serif; }
    #reader-body h2 { font-size: 1.3rem; font-weight: 700; margin: 1.2em 0 .35em; color: var(--text); }
    #reader-body h3 { font-size: 1.1rem; font-weight: 600; margin: 1em 0 .3em; color: var(--text); }
    #reader-body p  { margin: .8em 0; }
    #reader-body blockquote { border-left: 3px solid var(--acc); padding: 2px 0 2px 16px; color: var(--muted); margin: 1em 0; font-style: italic; }
    #reader-body ul, #reader-body ol { padding-left: 28px; margin: .7em 0; }
    #reader-body li { margin: .25em 0; }
    #reader-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
    #reader-body a { color: #60a5fa; }
    #reader-body strong { color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #reader-body em { color: #c4b5fd; }
    #reader-body code { background: var(--surface2); color: #86efac; padding: 1px 6px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: .87em; }
    #reader-body pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; margin: .8em 0; }
    #reader-body pre code { background: none; padding: 0; }

    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  </style>
</head>
<body>

<div id="header">
  <a href="index.html">← Home</a>
  <span class="header-sep">|</span>
  <div class="header-title">📖 Blog Feed</div>
  <div class="header-spacer"></div>
  <a href="blog.html" class="swap-btn" onclick="if(activePostId)localStorage.setItem('doh_blog_open',activePostId)">✍️ Editor</a>
  <div class="header-spacer"></div>
  <div id="header-profile"></div>
</div>

<div id="toolbar">
  <button id="new-btn" onclick="createPost()">+ New Post</button>
  <input id="search" type="text" placeholder="Search posts…" oninput="render()">
  <div class="filter-row">
    <button class="filter-btn" id="f-all"        onclick="setFilter('all')">All</button>
    <button class="filter-btn" id="f-published"  onclick="setFilter('published')">Published</button>
    <button class="filter-btn" id="f-draft"      onclick="setFilter('draft')">Drafts</button>
    <button class="filter-btn" id="f-public"     onclick="setFilter('public')">Public</button>
    <button class="filter-btn" id="f-private"    onclick="setFilter('private')">Private</button>
    <button class="filter-btn" id="f-mine"       onclick="setFilter('mine')">My Posts</button>
  </div>
  <span id="post-count"></span>
</div>

<div id="feed"></div>

<!-- ── READER OVERLAY ── -->
<div id="reader">
  <div id="reader-bar">
    <button id="reader-back" onclick="closeReader()">← Back to feed</button>
    <div class="reader-bar-spacer"></div>
    <button id="reader-edit" onclick="editPost()">Edit ↗</button>
  </div>
  <div id="reader-scroll">
    <div id="reader-content">
      <div id="reader-title"></div>
      <div id="reader-meta"></div>
      <div id="reader-tags"></div>
      <hr id="reader-divider">
      <div id="reader-body"></div>
    </div>
  </div>
</div>

<script>
// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getPosts() { return JSON.parse(localStorage.getItem('doh_blog_posts') || '[]'); }

function activeProfile() {
  const id = localStorage.getItem('doh_active_profile');
  if (!id) return { id: 'guest', name: 'Guest' };
  const profiles = JSON.parse(localStorage.getItem('doh_profiles') || '{}');
  return { id, name: (profiles[id] && profiles[id].name) || 'Unknown' };
}

function isOwner(post) {
  if (!post.authorId) return true;
  return post.authorId === activeProfile().id;
}

function canEdit(post) { return isOwner(post) || !!post.collaborative; }

function readMin(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  const words = ((d.textContent || '').trim().match(/\S+/g) || []).length;
  return Math.max(1, Math.round(words / 200));
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let curFilter    = 'all';
let activePostId = null;

// ─── FILTER ───────────────────────────────────────────────────────────────────
function setFilter(f) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('on'); });
  document.getElementById('f-' + f).classList.add('on');
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  let posts = getPosts();
  const q  = (document.getElementById('search').value || '').toLowerCase().trim();
  const ap = activeProfile();

  if      (curFilter === 'published') posts = posts.filter(function(p) { return p.status === 'published'; });
  else if (curFilter === 'draft')     posts = posts.filter(function(p) { return p.status === 'draft'; });
  else if (curFilter === 'public')    posts = posts.filter(function(p) { return p.visibility === 'public'; });
  else if (curFilter === 'private')   posts = posts.filter(function(p) { return p.visibility === 'private'; });
  else if (curFilter === 'mine')      posts = posts.filter(function(p) { return !p.authorId || p.authorId === ap.id; });

  if (q) posts = posts.filter(function(p) {
    return (p.title   || '').toLowerCase().includes(q) ||
           (p.excerpt || '').toLowerCase().includes(q) ||
           (p.tags    || []).some(function(t) { return t.toLowerCase().includes(q); });
  });

  const n = posts.length;
  document.getElementById('post-count').textContent = n + ' post' + (n !== 1 ? 's' : '');

  const feed = document.getElementById('feed');

  if (!n) {
    feed.innerHTML = '<div id="empty-state"><div class="empty-icon">📭</div><p>' +
      (q ? 'No posts matching <strong>"' + escHtml(q) + '"</strong>.'
         : 'No posts here yet.<br><a href="blog.html">Open the editor</a> to create one.') +
      '</p></div>';
    return;
  }

  feed.innerHTML = posts.map(function(p) {
    const rt   = readMin(p.body || '');
    const tags = (p.tags || []).map(function(t) { return '<span class="tag">' + escHtml(t) + '</span>'; }).join('');
    return '<div class="post-card" onclick="openReader(\'' + p.id + '\')">' +
      '<div class="card-badges">' +
        '<span class="badge badge-' + p.status + '">' + p.status + '</span>' +
        '<span class="badge badge-' + p.visibility + '">' + (p.visibility === 'public' ? '🌐 public' : '🔒 private') + '</span>' +
      '</div>' +
      '<div class="card-title" title="' + escHtml(p.title || 'Untitled') + '">' + escHtml(p.title || 'Untitled') + '</div>' +
      (p.excerpt ? '<div class="card-excerpt">' + escHtml(p.excerpt) + '</div>' : '') +
      '<div class="card-meta">' +
        '<span>' + escHtml(p.updated || p.created || '') + '</span>' +
        '<span class="card-meta-dot">·</span>' +
        '<span>' + rt + ' min read</span>' +
        (p.authorName ? '<span class="card-meta-dot">·</span><span>' + escHtml(p.authorName) + '</span>' : '') +
      '</div>' +
      (tags ? '<div class="card-tags">' + tags + '</div>' : '') +
    '</div>';
  }).join('');
}

// ─── READER ───────────────────────────────────────────────────────────────────
function openReader(id) {
  const post = getPosts().find(function(p) { return p.id === id; });
  if (!post) return;
  activePostId = id;

  const rt   = readMin(post.body || '');
  const tags = (post.tags || []).map(function(t) { return '<span class="tag">' + escHtml(t) + '</span>'; }).join('');

  document.getElementById('reader-title').textContent = post.title || 'Untitled';
  document.getElementById('reader-meta').innerHTML =
    '<span>' + escHtml(post.updated || post.created || '') + '</span>' +
    '<span>·</span><span>' + rt + ' min read</span>' +
    (post.authorName ? '<span>·</span><span>by ' + escHtml(post.authorName) + '</span>' : '');
  document.getElementById('reader-tags').innerHTML = tags;
  document.getElementById('reader-body').innerHTML  = post.body || '<p style="color:var(--muted)">No content yet.</p>';
  document.getElementById('reader-edit').style.display = canEdit(post) ? '' : 'none';

  document.getElementById('reader-scroll').scrollTop = 0;
  document.getElementById('reader').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeReader() {
  document.getElementById('reader').classList.remove('open');
  document.body.style.overflow = '';
  activePostId = null;
}

function createPost() {
  localStorage.setItem('doh_blog_new', '1');
  window.location.href = 'blog.html';
}

function editPost() {
  if (!activePostId) return;
  localStorage.setItem('doh_blog_open', activePostId);
  window.location.href = 'blog.html';
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeReader();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init() {
  const id = localStorage.getItem('doh_active_profile');
  if (id) {
    const profiles = JSON.parse(localStorage.getItem('doh_profiles') || '{}');
    if (profiles[id]) document.getElementById('header-profile').textContent = profiles[id].name;
  }
  setFilter('all');
  // Auto-open a post if arriving from the editor
  const openId = localStorage.getItem('doh_blog_open');
  if (openId) {
    localStorage.removeItem('doh_blog_open');
    if (getPosts().find(function(p) { return p.id === openId; })) openReader(openId);
  }
})();
</script>
</body>
</html>
