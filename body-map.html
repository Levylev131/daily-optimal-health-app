<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Map — Daily Optimal Health</title>
  <link rel="stylesheet" href="index.css">
  <script src="constants.js"></script>
  <script src="schedules-data.js"></script>
  <script src="utils.js"></script>
  <script src="modals.js"></script>
  <script src="stats.js"></script>
  <script src="profile.js"></script>
  <style>
    .bm-page { max-width: 780px; margin: 0 auto; padding: 32px 20px 80px; }
    .bm-title {
      text-align: center;
      font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900; letter-spacing: 1px;
      text-shadow: 0 0 50px var(--glow), 0 2px 12px rgba(0,0,0,.4);
      margin-bottom: 6px;
    }
    .bm-sub { text-align: center; color: var(--muted); font-size: .88rem; font-style: italic; margin-bottom: 36px; }
    .bm-figure-wrap { display: flex; justify-content: center; }

    .bm-svg { width: 100%; max-width: 600px; height: auto; overflow: visible; }

    /* Clickable body parts */
    .bp {
      cursor: pointer;
      stroke: var(--acc);
      stroke-opacity: 0.65;
      transition: stroke-opacity 0.15s ease, filter 0.15s ease;
    }
    .bp:hover {
      stroke-opacity: 1;
      filter: drop-shadow(0 0 7px var(--acc));
    }
    .bp.active {
      stroke-opacity: 1;
      filter: drop-shadow(0 0 12px var(--acc));
    }

    /* Filled nodes (head, hands, feet) */
    .bp-node {
      fill: var(--acc);
      fill-opacity: 0.18;
      stroke-width: 2.5;
    }
    .bp-node:hover { fill-opacity: 0.35; }

    /* Line-based limbs */
    .bp-limb {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Joint dots — decorative, not clickable */
    .jt {
      fill: var(--acc);
      fill-opacity: 0.35;
      pointer-events: none;
    }

    /* Face details — decorative */
    .face {
      fill: none;
      stroke: var(--acc);
      stroke-opacity: 0.5;
      stroke-linecap: round;
      pointer-events: none;
    }
    .face-dot {
      fill: var(--acc);
      fill-opacity: 0.5;
      pointer-events: none;
    }

    /* Muscle toggle button */
    .bm-controls { display: flex; justify-content: center; margin-top: 22px; }
    .muscle-btn {
      background: var(--glass); border: 1px solid var(--glass-b);
      color: var(--muted); font-size: .85rem; font-weight: 700; letter-spacing: .5px;
      padding: 10px 28px; border-radius: 10px; cursor: pointer;
      transition: all 0.2s;
    }
    .muscle-btn:hover { border-color: var(--acc); color: var(--text); box-shadow: 0 0 12px var(--glow); }
    .muscle-btn.active { background: var(--acc); color: #000; border-color: var(--acc); box-shadow: 0 0 18px var(--glow); }

    /* Muscle layer */
    .muscle-layer { display: none; }
    .muscles .muscle-layer { display: block; }
    .ms { fill: var(--acc); fill-opacity: 0.28; stroke: var(--acc); stroke-opacity: 0.5; stroke-width: 1; }

    /* Hover label */
    .bp-label {
      position: fixed; background: var(--glass); border: 1px solid var(--glass-b);
      backdrop-filter: blur(10px); color: var(--text); font-size: .82rem; font-weight: 700;
      padding: 6px 13px; border-radius: 8px; pointer-events: none;
      display: none; z-index: 100; white-space: nowrap;
    }
    .bp-label.show { display: block; }
  </style>
  <script src="health-notifications.js" defer></script>
</head>

  <script>
    if (STATE.mode === 'degen') document.body.classList.add('degen');
    if (STATE.mode === 'elder') document.body.classList.add('elder');
    initParticles();

    const muscleBtn = document.getElementById('muscle-btn');
    const figureWrap = document.querySelector('.bm-figure-wrap');
    muscleBtn.addEventListener('click', () => {
      figureWrap.classList.toggle('muscles');
      const on = figureWrap.classList.contains('muscles');
      muscleBtn.classList.toggle('active', on);
      muscleBtn.textContent = on ? '💪 Hide Muscles' : '💪 Show Muscles';
    });

    const label = document.getElementById('bp-label');
    document.querySelectorAll('.bp').forEach(el => {
      el.addEventListener('mouseenter', () => {
        label.textContent = el.dataset.label;
        label.classList.add('show');
      });
      el.addEventListener('mousemove', e => {
        label.style.left = (e.clientX + 14) + 'px';
        label.style.top  = (e.clientY - 36) + 'px';
      });
      el.addEventListener('mouseleave', () => label.classList.remove('show'));
      el.addEventListener('click', () => {
        const part = el.dataset.part;
        if (part) window.location.href = 'body-part.html?part=' + part;
      });
    });
