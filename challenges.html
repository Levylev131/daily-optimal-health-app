<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30-Day Challenges — Daily Optimal Health</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --acc: #2dd46e; --acc2: #1a8a50; --glow: rgba(45,212,110,0.35);
      --bg1: #061a0c; --bg2: #0d4a24; --bg3: #061a0c;
      --glass: rgba(255,255,255,0.07); --glass-b: rgba(255,255,255,0.13);
      --glass-h: rgba(255,255,255,0.12);
      --text: #f0fff4; --muted: rgba(240,255,244,0.55);
      --r: 14px; --r-sm: 10px;
      --trans: all 0.28s cubic-bezier(.4,0,.2,1);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 400% 400%;
      animation: gradShift 18s ease infinite;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }

    /* Back button */
    .back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 0;
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: var(--trans);
    }
    .back-btn:hover { color: var(--text); }

    /* Page header */
    .page-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .page-icon {
      font-size: 36px;
      line-height: 1;
    }
    .page-header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .page-header p {
      font-size: 14px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Section headings */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--acc);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title span.count {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: 20px;
      padding: 1px 10px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0;
      text-transform: none;
    }

    /* Glass card */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: var(--r);
      backdrop-filter: blur(12px);
      padding: 20px;
      transition: var(--trans);
    }
    .card:hover {
      background: var(--glass-h);
      border-color: rgba(255,255,255,0.2);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 32px 20px;
      font-size: 15px;
    }
    .empty-state .empty-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* Active challenge card */
    .active-card {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: var(--r);
      backdrop-filter: blur(12px);
      padding: 20px;
      margin-bottom: 14px;
      transition: var(--trans);
    }
    .active-card:hover {
      border-color: rgba(45,212,110,0.3);
    }

    .ch-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .ch-icon {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
    }
    .ch-info { flex: 1; }
    .ch-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .ch-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }
    .ch-day-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--acc);
      background: rgba(45,212,110,0.12);
      border: 1px solid rgba(45,212,110,0.25);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 14px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-label strong { color: var(--text); }
    .progress-track {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--acc2), var(--acc));
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      margin-bottom: 16px;
    }
    @media (max-width: 400px) {
      .cal-grid { grid-template-columns: repeat(6, 1fr); }
    }
    .cal-sq {
      aspect-ratio: 1;
      border-radius: 5px;
      transition: var(--trans);
      position: relative;
    }
    .cal-sq.checked {
      background: var(--acc);
      box-shadow: 0 0 6px rgba(45,212,110,0.5);
    }
    .cal-sq.missed {
      background: rgba(255,80,80,0.2);
      border: 1px solid rgba(255,80,80,0.15);
    }
    .cal-sq.future {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .cal-sq.today {
      box-shadow: 0 0 0 2px var(--acc), 0 0 10px var(--glow);
    }
    .cal-sq.today.future {
      background: rgba(45,212,110,0.1);
    }

    /* Action row */
    .action-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn-primary {
      background: var(--acc);
      color: #000;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--trans);
      flex: 1;
    }
    .btn-primary:hover:not(:disabled) {
      background: #3de87c;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--glow);
    }
    .btn-primary:disabled {
      background: rgba(45,212,110,0.25);
      color: rgba(0,0,0,0.4);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-secondary {
      background: var(--glass);
      color: var(--text);
      border: 1px solid var(--glass-b);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: var(--trans);
      font-weight: 600;
    }
    .btn-secondary:hover {
      background: var(--glass-h);
      border-color: rgba(255,80,80,0.4);
      color: #ff9999;
    }

    /* Available challenges grid */
    .avail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 500px) {
      .avail-grid { grid-template-columns: 1fr; }
    }

    .avail-card {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: var(--r);
      backdrop-filter: blur(12px);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: var(--trans);
      position: relative;
    }
    .avail-card:hover {
      background: var(--glass-h);
      border-color: rgba(45,212,110,0.25);
      transform: translateY(-2px);
    }
    .avail-icon { font-size: 26px; line-height: 1; }
    .avail-name { font-size: 15px; font-weight: 700; }
    .avail-desc { font-size: 12px; color: var(--muted); line-height: 1.45; flex: 1; }
    .badge-completed {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--acc);
      background: rgba(45,212,110,0.12);
      border: 1px solid rgba(45,212,110,0.25);
      border-radius: 20px;
      padding: 2px 8px;
      margin-bottom: 2px;
      width: fit-content;
    }
    .btn-start {
      background: var(--acc);
      color: #000;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: var(--trans);
      width: 100%;
      margin-top: 4px;
    }
    .btn-start:hover:not(:disabled) {
      background: #3de87c;
      box-shadow: 0 4px 14px var(--glow);
    }
    .btn-start:disabled {
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      cursor: not-allowed;
      border: 1px solid var(--glass-b);
    }

    /* Completed section */
    .completed-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .completed-item {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .completed-trophy {
      font-size: 24px;
      flex-shrink: 0;
    }
    .completed-info { flex: 1; }
    .completed-name { font-size: 15px; font-weight: 700; }
    .completed-dates { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .completed-badge {
      background: rgba(45,212,110,0.15);
      border: 1px solid rgba(45,212,110,0.3);
      border-radius: 20px;
      color: var(--acc);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      white-space: nowrap;
    }

    /* Sections spacing */
    .section { margin-bottom: 40px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20,50,30,0.97);
      border: 1px solid rgba(45,212,110,0.4);
      border-radius: 12px;
      padding: 14px 22px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      text-align: center;
      max-width: 340px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(45,212,110,0.1);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Confirm overlay */
    #confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #confirm-overlay.show { display: flex; }
    .confirm-box {
      background: #0d2a17;
      border: 1px solid rgba(45,212,110,0.2);
      border-radius: var(--r);
      padding: 28px 24px;
      max-width: 340px;
      width: 90%;
      text-align: center;
    }
    .confirm-box h3 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .confirm-box p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .confirm-btns {
      display: flex;
      gap: 10px;
    }
    .confirm-btns button {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: var(--trans);
    }
    .confirm-cancel {
      background: var(--glass);
      color: var(--text);
      border: 1px solid var(--glass-b) !important;
    }
    .confirm-cancel:hover { background: var(--glass-h); }
    .confirm-yes {
      background: rgba(255,60,60,0.8);
      color: #fff;
    }
    .confirm-yes:hover { background: rgba(255,60,60,1); }
  </style>
</head>
<body>

<div class="page">
  <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>

  <div class="page-header">
    <div class="page-icon">🏆</div>
    <div>
      <h1>30-Day Challenges</h1>
      <p>Pick a challenge, check in daily, and build lasting habits.</p>
    </div>
  </div>

  <!-- Active challenges -->
  <div class="section" id="section-active">
    <div class="section-title">Active <span class="count" id="active-count">0</span></div>
    <div id="active-list"></div>
  </div>

  <!-- Available challenges -->
  <div class="section">
    <div class="section-title">Available Challenges</div>
    <div class="avail-grid" id="avail-grid"></div>
  </div>

  <!-- Completed challenges -->
  <div class="section" id="section-completed" style="display:none;">
    <div class="section-title">Completed 🏆 <span class="count" id="completed-count">0</span></div>
    <div class="completed-list" id="completed-list"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Confirm overlay -->
<div id="confirm-overlay">
  <div class="confirm-box">
    <h3>Abandon Challenge?</h3>
    <p id="confirm-msg">This will remove this challenge and all your progress. This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-yes" id="confirm-yes-btn">Abandon</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ── Preset challenges ── */
  var CHALLENGES = [
    { id:'no-sugar',    icon:'🍬', name:'No Added Sugar',          desc:'Cut out added sugar completely for 30 days.' },
    { id:'daily-walk',  icon:'🚶', name:'Daily Walk',               desc:'Walk at least 20 minutes every single day.' },
    { id:'cold-shower', icon:'🚿', name:'Cold Showers',             desc:'End every shower with 2 minutes of cold water.' },
    { id:'no-alcohol',  icon:'🚫', name:'No Alcohol',               desc:'30 days completely alcohol-free.' },
    { id:'8k-steps',    icon:'👟', name:'8,000 Steps',              desc:'Hit 8,000 steps every day for 30 days.' },
    { id:'meditation',  icon:'🧘', name:'Daily Meditation',         desc:'10 minutes of meditation or breathwork daily.' },
    { id:'read-daily',  icon:'📚', name:'Read Every Day',           desc:'Read at least 10 pages every day.' },
    { id:'no-phone-am', icon:'📵', name:'No Phone in the Morning',  desc:'No phone for the first 30 minutes after waking.' },
    { id:'journaling',  icon:'📝', name:'Daily Journaling',         desc:'Write at least 3 sentences in a journal every day.' },
    { id:'early-sleep', icon:'😴', name:'Lights Out by 11 PM',      desc:'Be in bed with lights off by 11 PM every night.' }
  ];

  /* ── Date helpers ── */
  function todayKey() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function offsetDate(iso, n) {
    var d = new Date(iso + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function formatDateDisplay(iso) {
    var d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  /* ── Storage helpers ── */
  function getActive() {
    try { return JSON.parse(localStorage.getItem('ch:active') || '[]'); } catch(e) { return []; }
  }
  function setActive(arr) {
    localStorage.setItem('ch:active', JSON.stringify(arr));
  }
  function getCompleted() {
    try { return JSON.parse(localStorage.getItem('ch:completed') || '[]'); } catch(e) { return []; }
  }
  function setCompleted(arr) {
    localStorage.setItem('ch:completed', JSON.stringify(arr));
  }
  function getDayChecked(challengeId, date) {
    return localStorage.getItem('ch:' + challengeId + ':' + date) === '1';
  }
  function setDayChecked(challengeId, date) {
    localStorage.setItem('ch:' + challengeId + ':' + date, '1');
  }

  /* ── Core logic ── */
  function getCheckedCount(challengeId, startDate) {
    var count = 0;
    for (var i = 0; i < 30; i++) {
      var d = offsetDate(startDate, i);
      if (getDayChecked(challengeId, d)) count++;
    }
    return count;
  }

  function getDayNumber(startDate) {
    // Day 1 = startDate, Day 2 = startDate+1, etc.
    var start = new Date(startDate + 'T00:00:00');
    var today = new Date(todayKey() + 'T00:00:00');
    var diff = Math.floor((today - start) / 86400000);
    return Math.min(Math.max(diff + 1, 1), 30);
  }

  function isCheckedToday(challengeId) {
    return getDayChecked(challengeId, todayKey());
  }

  function isChallengeActive(challengeId) {
    return getActive().some(function(a) { return a.challengeId === challengeId; });
  }

  function isChallengeCompleted(challengeId) {
    return getCompleted().some(function(c) { return c.challengeId === challengeId; });
  }

  /* ── Toast ── */
  var toastTimer = null;
  function showToast(msg, duration) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      el.classList.remove('show');
    }, duration || 3000);
  }

  /* ── Confirm dialog ── */
  var confirmCallback = null;
  function openConfirm(challengeName, cb) {
    document.getElementById('confirm-msg').textContent =
      'This will remove "' + challengeName + '" and all your progress. This cannot be undone.';
    document.getElementById('confirm-overlay').classList.add('show');
    confirmCallback = cb;
    document.getElementById('confirm-yes-btn').onclick = function() {
      closeConfirm();
      if (confirmCallback) confirmCallback();
    };
  }
  function closeConfirm() {
    document.getElementById('confirm-overlay').classList.remove('show');
    confirmCallback = null;
  }
  document.getElementById('confirm-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });

  /* ── Check in ── */
  function checkIn(challengeId, startDate) {
    var today = todayKey();
    if (getDayChecked(challengeId, today)) return;

    // Make sure today is within the 30-day window
    var dayIdx = Math.floor((new Date(today+'T00:00:00') - new Date(startDate+'T00:00:00')) / 86400000);
    if (dayIdx < 0 || dayIdx >= 30) return;

    setDayChecked(challengeId, today);

    // Check if this completes the challenge (day 30 checked)
    var checkedCount = getCheckedCount(challengeId, startDate);
    var endDate = offsetDate(startDate, 29);

    if (getDayChecked(challengeId, endDate)) {
      // Challenge complete!
      completeChallenge(challengeId, startDate);
      showToast('🏆 Challenge complete! Amazing work!', 5000);
    } else {
      showToast('✓ Checked in! Keep going!', 2500);
      render();
    }
  }

  function completeChallenge(challengeId, startDate) {
    var active = getActive().filter(function(a) { return a.challengeId !== challengeId; });
    setActive(active);
    var completed = getCompleted();
    completed.push({ challengeId: challengeId, startDate: startDate, endDate: offsetDate(startDate, 29) });
    setCompleted(completed);
    render();
  }

  /* ── Start challenge ── */
  function startChallenge(challengeId) {
    var active = getActive();
    if (active.some(function(a) { return a.challengeId === challengeId; })) return;
    active.push({ challengeId: challengeId, startDate: todayKey() });
    setActive(active);
    showToast('Challenge started! Check in every day.', 2800);
    render();
  }

  /* ── Abandon ── */
  function abandonChallenge(challengeId, challengeName) {
    openConfirm(challengeName, function() {
      var active = getActive().filter(function(a) { return a.challengeId !== challengeId; });
      setActive(active);
      // Clear all check-in data for this challenge
      for (var i = 0; i < 30; i++) {
        // We can't know the startDate here so we'll clear for the next 60 days
        var d = offsetDate(todayKey(), -60 + i);
        localStorage.removeItem('ch:' + challengeId + ':' + d);
      }
      // Also clear from today forward
      for (var j = 0; j < 30; j++) {
        var d2 = offsetDate(todayKey(), j);
        localStorage.removeItem('ch:' + challengeId + ':' + d2);
      }
      showToast('Challenge abandoned.', 2000);
      render();
    });
  }

  /* ── Render active ── */
  function renderActive() {
    var active = getActive();
    var today = todayKey();
    var container = document.getElementById('active-list');
    document.getElementById('active-count').textContent = active.length;

    if (active.length === 0) {
      container.innerHTML = '<div class="card"><div class="empty-state"><span class="empty-icon">🎯</span>No active challenges — start one below</div></div>';
      return;
    }

    container.innerHTML = '';
    active.forEach(function(entry) {
      var ch = CHALLENGES.find(function(c) { return c.id === entry.challengeId; });
      if (!ch) return;

      var startDate = entry.startDate;
      var checkedCount = getCheckedCount(ch.id, startDate);
      var dayNum = getDayNumber(startDate);
      var alreadyChecked = isCheckedToday(ch.id);
      var pct = Math.round((checkedCount / 30) * 100);

      // Determine if today is within the window
      var todayIdx = Math.floor((new Date(today+'T00:00:00') - new Date(startDate+'T00:00:00')) / 86400000);
      var todayInWindow = todayIdx >= 0 && todayIdx < 30;

      // Build calendar squares
      var squares = '';
      for (var i = 0; i < 30; i++) {
        var sqDate = offsetDate(startDate, i);
        var isChecked = getDayChecked(ch.id, sqDate);
        var isToday = sqDate === today;
        var isPast = sqDate < today;
        var isFuture = sqDate > today;

        var cls = 'cal-sq';
        if (isChecked) cls += ' checked';
        else if (isToday) cls += ' today future'; // today not yet checked treated as special
        else if (isPast) cls += ' missed';
        else cls += ' future';

        if (isToday && !isChecked) cls = 'cal-sq today future'; // highlight today even unchecked
        if (isToday && isChecked) cls = 'cal-sq checked today';

        var label = 'Day ' + (i+1) + ' (' + sqDate + ')';
        squares += '<div class="' + cls + '" title="' + label + '"></div>';
      }

      var cardEl = document.createElement('div');
      cardEl.className = 'active-card';
      cardEl.innerHTML =
        '<div class="ch-header">' +
          '<div class="ch-icon">' + ch.icon + '</div>' +
          '<div class="ch-info">' +
            '<div class="ch-name">' + escHtml(ch.name) + '</div>' +
            '<div class="ch-desc">' + escHtml(ch.desc) + '</div>' +
          '</div>' +
          '<div class="ch-day-label">Day ' + dayNum + ' of 30</div>' +
        '</div>' +
        '<div class="progress-wrap">' +
          '<div class="progress-label">' +
            '<span><strong>' + checkedCount + '</strong> / 30 days checked</span>' +
            '<span><strong>' + pct + '%</strong></span>' +
          '</div>' +
          '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
        '</div>' +
        '<div class="cal-grid" style="margin-bottom:16px;">' + squares + '</div>' +
        '<div class="action-row">' +
          '<button class="btn-primary" id="checkin-' + ch.id + '" ' +
            (!todayInWindow || alreadyChecked ? 'disabled' : '') + '>' +
            (alreadyChecked ? '✓ Checked in today' : 'Check in today') +
          '</button>' +
          '<button class="btn-secondary" id="abandon-' + ch.id + '">Abandon</button>' +
        '</div>';

      container.appendChild(cardEl);

      // Bind check-in
      if (todayInWindow && !alreadyChecked) {
        document.getElementById('checkin-' + ch.id).addEventListener('click', (function(cid, sd) {
          return function() { checkIn(cid, sd); };
        })(ch.id, startDate));
      }

      // Bind abandon
      document.getElementById('abandon-' + ch.id).addEventListener('click', (function(cid, cname) {
        return function() { abandonChallenge(cid, cname); };
      })(ch.id, ch.name));
    });
  }

  /* ── Render available ── */
  function renderAvailable() {
    var active = getActive();
    var completed = getCompleted();
    var grid = document.getElementById('avail-grid');
    grid.innerHTML = '';

    CHALLENGES.forEach(function(ch) {
      var isActive = active.some(function(a) { return a.challengeId === ch.id; });
      var wasCompleted = completed.some(function(c) { return c.challengeId === ch.id; });

      var card = document.createElement('div');
      card.className = 'avail-card';

      var completedBadge = wasCompleted ? '<div class="badge-completed">✓ Completed</div>' : '';
      var btnLabel = isActive ? 'In Progress' : 'Start Challenge';
      var btnDisabled = isActive ? 'disabled' : '';

      card.innerHTML =
        '<div class="avail-icon">' + ch.icon + '</div>' +
        '<div class="avail-name">' + escHtml(ch.name) + '</div>' +
        completedBadge +
        '<div class="avail-desc">' + escHtml(ch.desc) + '</div>' +
        '<button class="btn-start" ' + btnDisabled + ' id="start-' + ch.id + '">' + btnLabel + '</button>';

      grid.appendChild(card);

      if (!isActive) {
        document.getElementById('start-' + ch.id).addEventListener('click', (function(cid) {
          return function() { startChallenge(cid); };
        })(ch.id));
      }
    });
  }

  /* ── Render completed ── */
  function renderCompleted() {
    var completed = getCompleted();
    var section = document.getElementById('section-completed');
    var list = document.getElementById('completed-list');
    document.getElementById('completed-count').textContent = completed.length;

    if (completed.length === 0) {
      section.style.display = 'none';
      return;
    }

    section.style.display = '';
    list.innerHTML = '';

    completed.forEach(function(entry) {
      var ch = CHALLENGES.find(function(c) { return c.id === entry.challengeId; });
      var name = ch ? ch.name : entry.challengeId;
      var icon = ch ? ch.icon : '🏆';

      var item = document.createElement('div');
      item.className = 'completed-item';
      item.innerHTML =
        '<div class="completed-trophy">' + icon + '</div>' +
        '<div class="completed-info">' +
          '<div class="completed-name">' + escHtml(name) + '</div>' +
          '<div class="completed-dates">' + formatDateDisplay(entry.startDate) + ' → ' + formatDateDisplay(entry.endDate) + '</div>' +
        '</div>' +
        '<div class="completed-badge">🏆 Complete</div>';

      list.appendChild(item);
    });
  }

  /* ── Escape HTML ── */
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Full render ── */
  function render() {
    renderActive();
    renderAvailable();
    renderCompleted();
  }

  /* ── Init ── */
  render();

})();
</script>
</body>
</html>
