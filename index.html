<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Optimal Health</title>
  <link rel="stylesheet" href="index.css">
  <script src="constants.js"></script>
  <script src="schedules-data.js"></script>
  <script src="utils.js"></script>
  <script src="modals.js"></script>
  <script src="stats.js"></script>
  <script src="profile.js"></script>
  <script src="health-notifications.js" defer></script>
</head>
<body>
  <div id="particles"></div>
  <div id="app">
    <div id="hub-view" class="view active"></div>
    <div id="sch-view" class="view"></div>
    <div id="profile-view" class="view"></div>
  </div>
  <div id="toast"></div>
  <div id="hm-tooltip"></div>
  <button id="profile-btn" onclick="toggleDropdown()" title="Profile"></button>
  <div id="modal-wrap"></div>

<script>
// ─── HUB ARRANGE ─────────────────────────────────────────────────────────────
let hubArrangeMode = false;
let _dragSrcId = null;

function getHubHidden() {
  try { return JSON.parse(localStorage.getItem('doh_hub_hidden')||'[]'); } catch(e) { return []; }
}
function toggleCardHidden(id) {
  const h=getHubHidden(), idx=h.indexOf(id);
  if(idx===-1) h.push(id); else h.splice(idx,1);
  localStorage.setItem('doh_hub_hidden', JSON.stringify(h));
  renderHub();
}

function getHubGroups() {
  try { return JSON.parse(localStorage.getItem('doh_hub_groups')||'[]'); } catch(e) { return []; }
}
function addHubGroup() {
  const id='__grp_'+Date.now();
  const groups=getHubGroups(); groups.push({id,name:'New Group'});
  localStorage.setItem('doh_hub_groups', JSON.stringify(groups));
  // Capture current DOM order so unsaved drags aren't lost
  const grid=document.getElementById('arrange-grid');
  let order=grid
    ? Array.from(grid.querySelectorAll('[data-card-id],[data-group-id]')).map(el=>el.dataset.cardId||el.dataset.groupId)
    : (()=>{try{return JSON.parse(localStorage.getItem('doh_hub_card_order')||'null');}catch(e){return null;}})()||getHubCards().map(c=>c.id);
  localStorage.setItem('doh_hub_card_order', JSON.stringify([...order, id]));
  renderHub();
  setTimeout(()=>{
    const el=document.querySelector(`[data-group-id="${id}"] .hub-grp-name`);
    if(el){el.focus();const r=document.createRange();r.selectNodeContents(el);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}
  },50);
}
function deleteHubGroup(id) {
  localStorage.setItem('doh_hub_groups', JSON.stringify(getHubGroups().filter(g=>g.id!==id)));
  const o=(()=>{try{return JSON.parse(localStorage.getItem('doh_hub_card_order')||'null');}catch(e){return null;}})();
  if(o) localStorage.setItem('doh_hub_card_order', JSON.stringify(o.filter(i=>i!==id)));
  renderHub();
}
function saveGroupName(id, raw) {
  const name=raw.trim()||'Untitled'; const groups=getHubGroups(); const g=groups.find(g=>g.id===id);
  if(g){g.name=name; localStorage.setItem('doh_hub_groups', JSON.stringify(groups));}
}
function getHubCollapsed() {
  try { return JSON.parse(localStorage.getItem('doh_hub_collapsed')||'[]'); } catch(e) { return []; }
}
function toggleGroupCollapsed(id) {
  const c=getHubCollapsed(), idx=c.indexOf(id);
  if(idx===-1) c.push(id); else c.splice(idx,1);
  localStorage.setItem('doh_hub_collapsed', JSON.stringify(c));
  renderHub();
}
function getCardGroups() {
  try { return JSON.parse(localStorage.getItem('doh_hub_card_groups')||'{}'); } catch(e) { return {}; }
}
function assignCardToGroup(cardId, groupId) {
  const m=getCardGroups();
  if(groupId) m[cardId]=groupId; else delete m[cardId];
  localStorage.setItem('doh_hub_card_groups', JSON.stringify(m));
  renderHub();
}
function _hubGroupEl(g, arrange) {
  if(arrange) return `<div class="hub-grp-hdr hub-grp-arrange" data-group-id="${g.id}" draggable="true" title="Drag to reorder · Drop a card here to add it to this group" ondragstart="hubDragStart(event,'${g.id}')" ondragover="hubDragOver(event)" ondragleave="hubDragLeave(event)" ondrop="hubDrop(event,'${g.id}')" ondragend="hubDragEnd(event)"><span class="hub-drag-handle" draggable="false" style="position:static;opacity:.5;font-size:.85rem">⠿</span><span class="hub-grp-name" contenteditable="true" draggable="false" spellcheck="false" onblur="saveGroupName('${g.id}',this.textContent)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}" onclick="event.stopPropagation()">${g.name}</span><button class="hub-grp-del" draggable="false" onmousedown="event.stopPropagation()" onclick="event.stopPropagation();deleteHubGroup('${g.id}')">×</button></div>`;
  const collapsed=getHubCollapsed().includes(g.id);
  return `<div class="hub-grp-hdr" data-collapsed="${collapsed}"><button class="hub-grp-toggle" onclick="toggleGroupCollapsed('${g.id}')" title="${collapsed?'Expand':'Collapse'}">${collapsed?'▸':'▾'}</button><span class="hub-grp-name">${g.name}</span></div>`;
}

function getHubCards() {
  const all = [];
  ['longevity','muscle','cardio','bone','brain','digestive'].forEach(id => {
    const g=S[id], p=pct(id), r=22, circ=2*Math.PI*r, off=ringOffset(p,r);
    all.push({ id, section:'health',
      inner:`<div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="${r}"/><circle class="r-fill" cx="25" cy="25" r="${r}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/></svg><div class="ring-icon">${g.icon}</div></div><div class="card-info"><div class="card-title">${g.title}</div><div class="card-desc">${g.subtitle}</div><div class="card-pct">${p>0?Math.round(p*100)+'% today':'Start →'}</div></div>`,
      onclick:`openGoal('${id}')`
    });
  });
  if (STATE.mode==='degen') ['degenerates','degenerates-plus','super-degenerate'].forEach(id => {
    const g=S[id], p=pct(id), r=22, circ=2*Math.PI*r, off=ringOffset(p,r);
    all.push({ id, section:'degen',
      inner:`<div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="${r}"/><circle class="r-fill" cx="25" cy="25" r="${r}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" style="stroke:#c800ff;filter:drop-shadow(0 0 3px #c800ff)"/></svg><div class="ring-icon">${g.icon}</div></div><div class="card-info"><div class="card-title">${g.title}</div><div class="card-desc">${g.subtitle}</div><div class="card-pct">${p>0?Math.round(p*100)+'% today':'Start →'}</div></div>`,
      onclick:`openGoal('${id}')`
    });
  });
  [
    {id:'tools',          icon:'🛠️', title:'Tools &amp; Trackers',  desc:'Journal, water, mood, supplements, sleep log, and your personal checklist',              href:'tools.html'},
    {id:'workout-log',    icon:'📋', title:'Workout Logger',         desc:'Log exercises, sets, reps, and weight. Track progressive overload day by day.',         href:'workout-log.html'},
    {id:'nutrition-log',  icon:'🥗', title:'Nutrition Log',          desc:'Track meals and macros — protein, carbs, fat, and calories across the day.',             href:'nutrition-log.html'},
    {id:'fasting-tracker',icon:'⏱️', title:'Fasting Tracker',        desc:'Start and track intermittent fasts. Set goals, monitor progress, log history.',         href:'fasting-tracker.html'},
    {id:'habit-tracker',  icon:'✅', title:'Habit Tracker',          desc:'Build custom daily habits. Track streaks and stay consistent over time.',               href:'habit-tracker.html'},
    {id:'challenges',     icon:'🏆', title:'30-Day Challenges',      desc:'Pick a challenge, check in daily, and build a new habit in 30 days.',                   href:'challenges.html'},
    {id:'breathing-timer',icon:'🫁', title:'Breathing Timer',        desc:'Box breathing, 4-7-8, coherent breathing and more. Guided sessions with XP rewards.',   href:'breathing-timer.html'},
    {id:'creatine',       icon:'⚡', title:'Creatine Guide',         desc:'Everything about creatine monohydrate — protocols, dosage calculator, myths, safety, and daily logging.', href:'creatine.html'},
    {id:'spices',         icon:'🌿', title:'Spice Guide',            desc:'Health benefits of the 7 most powerful spices — compounds, dosage, how to use, and pro stacking tips.',     href:'spices.html'},
    {id:'holistic',       icon:'☯️', title:'Holistic Health',        desc:'Evidence-based practices — cold therapy, sauna, forest bathing, grounding, meditation, and more.',            href:'holistic.html'},
    {id:'body-map',       icon:'🫀', title:'Body Map',               desc:'Explore your body by region. Tap any area to see health info and tips.',                href:'body-map.html'},
    {id:'blog-reader',    icon:'✍️', title:'Blogs',                  desc:'Write, publish, and browse your posts. Export as clean HTML to share anywhere.',        href:'blog-reader.html'},
    {id:'dashboard',      icon:'📊', title:'Dashboard',              desc:'All your data at a glance — XP, streaks, habits, fasting, workouts, and nutrition.',    href:'dashboard.html'},
  ].forEach(({id,icon,title,desc,href}) => all.push({ id, section:'tools',
    inner:`<div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="22"/></svg><div class="ring-icon">${icon}</div></div><div class="card-info"><div class="card-title">${title}</div><div class="card-desc">${desc}</div><div class="card-pct">Open →</div></div>`,
    onclick:`window.location.href='${href}'`
  }));
  const cs = JSON.parse(localStorage.getItem(storagePrefix()+'cscheds')||'[]');
  cs.forEach(s => {
    const r=22, circ=2*Math.PI*r;
    const chk=JSON.parse(localStorage.getItem(`${storagePrefix()}${s.id}_${activeKey()}`)||'[]');
    const p=s.tasks.length?chk.length/s.tasks.length:0, off=ringOffset(p,r);
    all.push({ id:'custom-'+s.id, section:'custom',
      inner:`<div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="${r}"/><circle class="r-fill" cx="25" cy="25" r="${r}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/></svg><div class="ring-icon">${s.icon}</div></div><div class="card-info"><div class="card-title">${s.title}</div><div class="card-desc">${s.subtitle||s.tasks.length+' tasks'}</div><div class="card-pct">${p>0?Math.round(p*100)+'% today':'Start →'}</div></div>`,
      onclick:`window.location.href='custom-view.html#${s.id}'`
    });
  });
  return all;
}

function _hubCardEl(card, arrange) {
  const tc = card.section==='health' || card.section==='custom' ? ' gc-health' : card.section==='tools' ? ' gc-tools' : '';
  if (arrange) {
    const hidden = getHubHidden().includes(card.id);
    const visBtn = `<button class="hub-vis-btn ${hidden?'hub-vis-show':'hub-vis-hide'}" draggable="false" onmousedown="event.stopPropagation()" onclick="event.stopPropagation();toggleCardHidden('${card.id}')" title="${hidden?'Show card':'Hide card'}">${hidden?'↩':'×'}</button>`;
    const currentGroupId = getCardGroups()[card.id];
    const currentGroupName = currentGroupId ? (getHubGroups().find(g=>g.id===currentGroupId)||{name:'?'}).name : '';
    const grpBadge = currentGroupId
      ? `<div class="hub-grp-card-badge" draggable="false" onmousedown="event.stopPropagation()" onclick="event.stopPropagation();assignCardToGroup('${card.id}','')">📁 ${currentGroupName} ×</div>`
      : '';
    return `<div class="hub-arr-unit" data-card-id="${card.id}" draggable="true" ondragstart="hubDragStart(event,'${card.id}')" ondragover="hubDragOver(event)" ondragleave="hubDragLeave(event)" ondrop="hubDrop(event,'${card.id}')" ondragend="hubDragEnd(event)"><div class="goal-card hub-arrange-card${tc}${hidden?' gc-hidden-card':''}"><div class="hub-drag-handle" draggable="false">⠿</div>${visBtn}${card.inner}</div>${grpBadge}</div>`;
  }
  return `<div class="goal-card${tc}" data-card-id="${card.id}" onclick="${card.onclick}">${card.inner}</div>`;
}

// ─── RENDER HUB ──────────────────────────────────────────────────────────────
function disableNotifFromHub(pageKey) {
  localStorage.removeItem('notif:' + pageKey + ':enabled');
  localStorage.removeItem('notif:' + pageKey + ':tasks');
  if (window.dohNotifications) window.dohNotifications.schedule();
  renderHub();
}

function renderHub() {
  const isDegen = STATE.mode==='degen';
  const lv = getLevel(isDegen);
  const xpIn = STATE.xp - lv.min;
  const xpFor = lv.next ? lv.next.min - lv.min : 1;
  const xpPct = lv.next ? Math.min(100,xpIn/xpFor*100) : 100;
  const done = todayDone();

  const NOTIF_NAMES = {
    'bone-health':           { name: 'Bone Health',           icon: '🦴', url: 'bone.html' },
    'brain-health':          { name: 'Brain Health',           icon: '🧠', url: 'brain.html' },
    'cardiovascular-health': { name: 'Cardiovascular Health',  icon: '❤️', url: 'cardio.html' },
    'digestive-health':      { name: 'Digestive Health',       icon: '🌿', url: 'digestive.html' },
    'longevity':             { name: 'Longevity',              icon: '🌿', url: 'longevity.html' },
    'muscle-building':       { name: 'Muscle Building',        icon: '💪', url: 'muscle.html' },
    'degenerates':           { name: 'Degenerate Mode',        icon: '💀', url: 'degenerates.html' },
    'habit-tracker':         { name: 'Habit Tracker',          icon: '✅', url: 'habit-tracker.html' },
    'fasting-tracker':       { name: 'Fasting Tracker',        icon: '⏱️', url: 'fasting-tracker.html' },
    'workout-logger':        { name: 'Workout Logger',         icon: '🏋️', url: 'workout-log.html' },
    'nutrition-log':         { name: 'Nutrition Log',          icon: '🥗', url: 'nutrition-log.html' },
    'breathing-timer':       { name: 'Breathing Timer',        icon: '🫁', url: 'breathing-timer.html' },
    'creatine-guide':        { name: 'Creatine Guide',         icon: '💊', url: 'creatine.html' },
    '30-day-challenges':     { name: '30-Day Challenges',      icon: '🏆', url: 'challenges.html' },
  };
  function resolveNotifInfo(pk) {
    if (NOTIF_NAMES[pk]) return NOTIF_NAMES[pk];
    if (pk.startsWith('ch-')) {
      const raw = localStorage.getItem('notif:' + pk + ':tasks');
      const tasks = raw ? JSON.parse(raw) : null;
      const label = tasks && tasks[0] ? tasks[0].label : null;
      const icon = tasks && tasks[0] ? (tasks[0].icon || '⏰') : '⏰';
      const name = label ? label.replace(/^Check in:\s*/i, '') + ' Challenge' : 'Challenge Reminder';
      return { name, icon, url: 'challenges.html' };
    }
    return { name: pk, icon: '🔔', url: null };
  }
  const enabledKeys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('notif:') && k.endsWith(':enabled')) enabledKeys.push(k.slice(6,-8));
  }
  const notifItems = enabledKeys.length === 0
    ? '<div class="notif-empty">No reminders set — open a schedule and tap 🔔</div>'
    : enabledKeys.map(pk => {
        const info = resolveNotifInfo(pk);
        const nameHtml = info.url
          ? `<span class="notif-item-link" onclick="window.location.href='${info.url}'">${info.icon} ${info.name}</span>`
          : `<span>${info.icon} ${info.name}</span>`;
        return `<div class="notif-item">
          <div class="notif-item-name">${nameHtml}</div>
          <button class="notif-off-btn" onclick="disableNotifFromHub('${pk}')">Turn off</button>
        </div>`;
      }).join('');

  // Build cards section
  const allCards = getHubCards();
  const savedOrder = (() => { try { return JSON.parse(localStorage.getItem('doh_hub_card_order')||'null'); } catch(e) { return null; } })();
  const arrange = hubArrangeMode;
  const newSchBtn = `<div style="text-align:center;margin-bottom:20px"><button onclick="window.location.href='schedule-builder.html'" style="background:none;border:1px solid var(--glass-b);color:var(--muted);border-radius:20px;padding:6px 18px;font-size:.78rem;cursor:pointer;transition:var(--trans)" onmouseover="this.style.borderColor='var(--acc)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--glass-b)';this.style.color='var(--muted)'">＋ New Schedule</button></div>`;

  const hiddenSet = new Set(getHubHidden());
  let cardsHtml;
  if (arrange || savedOrder) {
    const cMap={}; allCards.forEach(c=>cMap[c.id]=c);
    const gMap={}; getHubGroups().forEach(g=>gMap[g.id]=g);
    let orderedIds;
    if (savedOrder) {
      orderedIds=[...savedOrder].filter(id=>id!=='__widget');
      allCards.forEach(c=>{ if(!orderedIds.includes(c.id)) orderedIds.push(c.id); });
      ['__widget1','__widget2','__widget3'].forEach(w=>{ if(!orderedIds.includes(w)) orderedIds.push(w); });
    } else {
      orderedIds=allCards.map(c=>c.id);
      orderedIds.push('__widget1','__widget2','__widget3');
    }
    if (!arrange) orderedIds=orderedIds.filter(id=>id.startsWith('__grp_')||!hiddenSet.has(id));
    const toolbar = arrange
      ? `<div class="hub-arrange-bar"><button class="hub-arr-reset" onclick="resetHubOrder()">↺ Default Layout</button><button class="hub-arr-add-grp" onclick="addHubGroup()">＋ Group</button><button class="hub-arr-done" onclick="doneHubArrange()">✓ Save Order</button></div>`
      : `<div class="hub-arrange-bar"><button class="hub-arr-btn" onclick="window.location.href='setups.html'">⚙️ Setups</button><button class="hub-arr-btn" onclick="toggleHubArrange()">⠿ Arrange</button></div>`;
    let itemsHtml;
    if (arrange) {
      itemsHtml=orderedIds.map(id=>{
        if(id==='__widget1') return _hubWidgetArrangeEl(1);
        if(id==='__widget2') return _hubWidgetArrangeEl(2);
        if(id==='__widget3') return _hubWidgetArrangeEl(3);
        if(id.startsWith('__grp_')){ const g=gMap[id]; return g?_hubGroupEl(g,true):''; }
        const c=cMap[id]; return c?_hubCardEl(c,true):'';
      }).join('');
      cardsHtml=`${toolbar}<div class="goal-grid" id="arrange-grid">${itemsHtml}</div>`;
    } else {
      const collapsedSet=new Set(getHubCollapsed());
      const cardGroupsMap=getCardGroups();
      const renderedInGroup=new Set();
      const viewItems=[];
      for(const id of orderedIds){
        if(id==='__widget1'){ viewItems.push({type:'widget',n:1}); continue; }
        if(id==='__widget2'){ viewItems.push({type:'widget',n:2}); continue; }
        if(id==='__widget3'){ viewItems.push({type:'widget',n:3}); continue; }
        if(id.startsWith('__grp_')){
          const g=gMap[id]; if(!g) continue;
          const gcids=orderedIds.filter(cid=>!cid.startsWith('__grp_')&&!cid.startsWith('__widget')&&cMap[cid]&&cardGroupsMap[cid]===id);
          gcids.forEach(cid=>renderedInGroup.add(cid));
          viewItems.push({type:'group',g,cards:gcids});
        } else {
          if(renderedInGroup.has(id)) continue;
          const c=cMap[id]; if(c) viewItems.push({type:'card',c});
        }
      }
      const rawSecs=[]; let pending=[];
      for(const item of viewItems){
        if(item.type==='card'||item.type==='widget'){ pending.push(item); }
        else{ if(pending.length){rawSecs.push({type:'mixed',items:pending});pending=[];} rawSecs.push(item); }
      }
      if(pending.length) rawSecs.push({type:'mixed',items:pending});
      itemsHtml=rawSecs.map(sec=>{
        if(sec.type==='mixed'){
          let result=''; const cardBuf=[]; const its=sec.items;
          const flushCards=()=>{ if(!cardBuf.length)return; result+=`<div class="goal-grid" style="align-items:start">${cardBuf.join('')}</div>`; cardBuf.length=0; };
          let j=0;
          while(j<its.length){
            const item=its[j];
            if(item.type==='widget'){
              flushCards();
              const n=item.n,wtype=getWidgetType(n),sz=getWidgetSz(n),pos=getWidgetPos(n);
              const wEl=`<div class="hub-widget-card${sz===2?' hww-card-m':''}" id="hub-widget-${n}" data-widget="${wtype}" data-size="${sz}" style="position:relative"><div id="hww-${n}-body" class="hww-body">${_buildWidgetHTML(wtype,n)}</div></div>`;
              if(sz>=3){
                // L: full-width widget, remaining 6 cards fall through to goal-grid
                result+=`<div class="hub-widget-group" style="grid-template-columns:1fr">${wEl}</div>`;
                j+=1;
              } else if(sz===2){
                // M: widget takes 2/3, one card stack on the side
                const col1=its.slice(j+1,j+4).filter(it=>it.type==='card');
                const c1Html=col1.map(it=>_hubCardEl(it.c,false)).join('');
                const grp=pos==='right'?`<div class="hwg-cards">${c1Html}</div>${wEl}`:`${wEl}<div class="hwg-cards">${c1Html}</div>`;
                result+=`<div class="hub-widget-group">${grp}</div>`;
                j+=1+col1.length;
              } else {
                // S: widget in 1/3, two card stacks (pos-aware)
                const col1=its.slice(j+1,j+4).filter(it=>it.type==='card');
                const col2=its.slice(j+1+col1.length,j+1+col1.length+3).filter(it=>it.type==='card');
                const c1Html=col1.map(it=>_hubCardEl(it.c,false)).join('');
                const c2Html=col2.map(it=>_hubCardEl(it.c,false)).join('');
                const grpContent=pos==='mid'?`<div class="hwg-cards">${c1Html}</div>${wEl}<div class="hwg-cards">${c2Html}</div>`:pos==='right'?`<div class="hwg-cards">${c1Html}</div><div class="hwg-cards">${c2Html}</div>${wEl}`:`${wEl}<div class="hwg-cards">${c1Html}</div><div class="hwg-cards">${c2Html}</div>`;
                result+=`<div class="hub-widget-group">${grpContent}</div>`;
                j+=1+col1.length+col2.length;
              }
            } else { cardBuf.push(_hubCardEl(item.c,false)); j++; }
          }
          flushCards();
          return result;
        }
        const collapsed=collapsedSet.has(sec.g.id);
        const countTag=collapsed&&sec.cards.length>0?` (${sec.cards.length})`:'';
        const gcHtml=sec.cards.map(id=>_hubCardEl(cMap[id],false)).join('');
        return `<div class="sec-label" style="margin-top:28px"><button class="hub-grp-toggle" onclick="toggleGroupCollapsed('${sec.g.id}')" title="${collapsed?'Expand':'Collapse'}">${collapsed?'▸':'▾'}</button> ${sec.g.name}${countTag}</div>${collapsed?'':`<div class="goal-grid">${gcHtml}</div>`}`;
      }).join('');
      cardsHtml=`${toolbar}${itemsHtml}${allCards.some(c=>c.section==='custom')?newSchBtn:''}`;
    }
  } else {
    const health  = allCards.filter(c=>(c.section==='health'||c.section==='custom') && !hiddenSet.has(c.id));
    const degenC  = allCards.filter(c=>c.section==='degen'  && !hiddenSet.has(c.id));
    const tools   = allCards.filter(c=>c.section==='tools'  && !hiddenSet.has(c.id));
    const hasCustom = allCards.some(c=>c.section==='custom' && !hiddenSet.has(c.id));

// ─── HUB WIDGET SYSTEM ───────────────────────────────────────────────────────
function _hwwDate() { return new Date().toISOString().slice(0,10); }

const _WIDGET_DEFAULTS = ['water','habits','sleep'];
function getWidgetType(n) {
  const key='doh_hub_widget_'+n;
  if(n===1 && !localStorage.getItem(key) && localStorage.getItem('doh_hub_widget')) {
    localStorage.setItem(key, localStorage.getItem('doh_hub_widget'));
    localStorage.removeItem('doh_hub_widget');
  }
  return localStorage.getItem(key)||_WIDGET_DEFAULTS[n-1]||'water';
}
function setWidgetType(n,id) { localStorage.setItem('doh_hub_widget_'+n,id); renderHub(); }
function getWidgetSz(n) {
  const key='doh_hub_widget_size_'+n;
  if(n===1 && !localStorage.getItem(key) && localStorage.getItem('doh_hub_widget_size')) {
    localStorage.setItem(key, localStorage.getItem('doh_hub_widget_size'));
    localStorage.removeItem('doh_hub_widget_size');
  }
  return parseInt(localStorage.getItem(key)||'1');
}
function setWidgetSz(n,v) { localStorage.setItem('doh_hub_widget_size_'+n,String(v)); renderHub(); }
function getWidgetPos(n) { return localStorage.getItem('doh_hub_widget_pos_'+n)||'left'; }

// — Water —
function _hwwWaterKey() { return storagePrefix()+'water_'+_hwwDate(); }
function _hwwGoalKey()  { return storagePrefix()+'water_goal'; }
function _hwwGetWater() { return parseInt(localStorage.getItem(_hwwWaterKey())||'0'); }
function _hwwGetGoal()  { return parseInt(localStorage.getItem(_hwwGoalKey())||'8'); }

function renderHubWater(n) {
  const count=_hwwGetWater(), goal=_hwwGetGoal();
  const goalEl=document.getElementById('hww-'+n+'-goal-display');
  if(goalEl) goalEl.textContent=goal;
  const fillEl=document.getElementById('hww-'+n+'-fill');
  if(fillEl) fillEl.style.width=(goal>0?Math.min(100,count/goal*100):0)+'%';
  const labelEl=document.getElementById('hww-'+n+'-label');
  if(labelEl) labelEl.textContent=goal===0?'Zero cups? Bold strategy. 🏜️':count+' / '+goal+' cups'+(count>=goal?' 🎉':'');
  const dotsEl=document.getElementById('hww-'+n+'-dots');
  if(dotsEl) dotsEl.innerHTML=goal>0?Array.from({length:goal},(_,i)=>`<div class="hww-dot${i<count?' filled':''}">${i<count?'💧':''}</div>`).join(''):'';
}
function hubAdjustWater(delta, n) {
  const prev=_hwwGetWater(), goal=_hwwGetGoal();
  if(delta>0&&prev>=48){toast('⚠️ 48 cups is the limit!');return;}
  const count=Math.max(0,Math.min(48,prev+delta));
  localStorage.setItem(_hwwWaterKey(),count);
  // Sync to habit tracker: mark any water-named habit done/undone
  try {
    const habits=JSON.parse(localStorage.getItem('hab:list')||'[]');
    habits.forEach(h=>{
      if(h.name&&h.name.toLowerCase().indexOf('water')!==-1){
        if(count>=goal) localStorage.setItem('hab:'+h.id+':'+_hwwDate(),'1');
        else localStorage.removeItem('hab:'+h.id+':'+_hwwDate());
      }
    });
  } catch(e) { console.error(e); }
  for(let i=1;i<=3;i++) if(getWidgetType(i)==='water') renderHubWater(i);
  if(count===goal&&prev<goal) toast('🎉 Hydration goal crushed!');
}
function hubSetWaterGoal(val, n) {
  localStorage.setItem(_hwwGoalKey(),String(Math.max(0,Math.min(24,parseInt(val)||0))));
  for(let i=1;i<=3;i++) if(getWidgetType(i)==='water') renderHubWater(i);
}

// — Habits —
function renderHubHabits(n) {
  const el=document.getElementById('hww-'+n+'-habits-list');
  if(!el) return;
  const date=_hwwDate();

  el.innerHTML=habits.map(h=>{

    return `<div class="hww-check-item${done?' hww-checked':''}" onclick="hubToggleHabit('${h.id}',${n})"><div class="hww-check-box">${done?'✓':''}</div><span class="hww-check-text">${h.icon?h.icon+' ':''}${h.name}</span></div>`;
  }).join('');
}
function hubToggleHabit(id, n) {
  const k='hab:'+id+':'+_hwwDate();
  if(localStorage.getItem(k)==='1') localStorage.removeItem(k); else localStorage.setItem(k,'1');
  for(let i=1;i<=3;i++) if(getWidgetType(i)==='habits') renderHubHabits(i);
}

// — Sleep —
function initHubSleep(n) {
  const bed=document.getElementById('hww-'+n+'-sleep-bed');
  if(!bed) return;
  const saved=localStorage.getItem(storagePrefix()+'sleep_'+_hwwDate());
  if(saved){try{const d=JSON.parse(saved);bed.value=d.bed||'';document.getElementById('hww-'+n+'-sleep-wake').value=d.wake||'';}catch(e){ console.error(e); }}
  renderHubSleep(n);
}
function renderHubSleep(n) {
  const bed=document.getElementById('hww-'+n+'-sleep-bed'), wake=document.getElementById('hww-'+n+'-sleep-wake');
  const durEl=document.getElementById('hww-'+n+'-sleep-dur'), qEl=document.getElementById('hww-'+n+'-sleep-q');
  if(!bed||!wake||!durEl||!qEl) return;
  if(!bed.value||!wake.value){durEl.textContent='—';qEl.textContent='Enter your times above';return;}
  const [bh,bm]=bed.value.split(':').map(Number), [wh,wm]=wake.value.split(':').map(Number);
  let bMins=bh*60+bm, wMins=wh*60+wm;
  if(wMins<=bMins) wMins+=1440;
  const total=wMins-bMins, h=Math.floor(total/60), m=total%60;
  durEl.textContent=h+'h'+(m?' '+m+'m':'');
  qEl.textContent=total<300?'Very short — under 5 hours':total<360?'Under 6 hours — aim for 7+':total<420?'Decent — aim for 7–9 hours':total<=540?'Great — optimal sleep window':'Over 9 hours — ensure quality rest';
}
function hubSaveSleep(n) {
  const bed=document.getElementById('hww-'+n+'-sleep-bed'), wake=document.getElementById('hww-'+n+'-sleep-wake');
  if(!bed||!wake||!bed.value||!wake.value) return;
  localStorage.setItem(storagePrefix()+'sleep_'+_hwwDate(),JSON.stringify({bed:bed.value,wake:wake.value}));
  const btn=document.getElementById('hww-'+n+'-sleep-save');
  if(btn){btn.textContent='Saved ✓';setTimeout(()=>{btn.textContent='Save Sleep Log';},1600);}
}

function renderHubSupps(n) {

function hubToggleSupp(i, n) {

// ─── ARRANGE ACTIONS ─────────────────────────────────────────────────────────
function toggleHubArrange() { hubArrangeMode=!hubArrangeMode; renderHub(); }

function doneHubArrange() {
  const items=document.querySelectorAll('#arrange-grid [data-card-id], #arrange-grid [data-group-id]');
  localStorage.setItem('doh_hub_card_order', JSON.stringify(Array.from(items).map(el=>el.dataset.cardId||el.dataset.groupId)));
  hubArrangeMode=false; renderHub();
}

function resetHubOrder() {
  localStorage.removeItem('doh_hub_card_order');
  localStorage.removeItem('doh_hub_groups');
  localStorage.removeItem('doh_hub_hidden');
  localStorage.removeItem('doh_hub_collapsed');
  localStorage.removeItem('doh_hub_card_groups');
  hubArrangeMode=false; renderHub();
}

function hubDragStart(e, id) {
  _dragSrcId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain', id);
  requestAnimationFrame(()=>{
    const el=document.querySelector(`[data-card-id="${id}"], [data-group-id="${id}"]`);
    if(el) el.classList.add('hub-dragging');
  });
}

function hubDragOver(e) {
  e.preventDefault();
  const card=e.currentTarget;
  if(!card) return;
  const targetId=card.dataset.cardId||card.dataset.groupId;
  if(targetId===_dragSrcId) return;
  document.querySelectorAll('.hub-drop-before,.hub-drop-after,.hub-drop-assign').forEach(el=>el.classList.remove('hub-drop-before','hub-drop-after','hub-drop-assign'));
  if(_dragSrcId && !_dragSrcId.startsWith('__grp_') && targetId && targetId.startsWith('__grp_')) {
    card.classList.add('hub-drop-assign'); return;
  }
  const rect=card.getBoundingClientRect();
  card.classList.add(e.clientX<rect.left+rect.width/2?'hub-drop-before':'hub-drop-after');
}

function hubDragLeave(e) {
  if(!e.currentTarget.contains(e.relatedTarget))
    e.currentTarget.classList.remove('hub-drop-before','hub-drop-after','hub-drop-assign');
}

function hubDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.hub-drop-before,.hub-drop-after,.hub-drop-assign').forEach(el=>el.classList.remove('hub-drop-before','hub-drop-after','hub-drop-assign'));
  if(!_dragSrcId||_dragSrcId===targetId) return;
  const grid=document.getElementById('arrange-grid');
  if(!grid) return;

  // Card dropped onto group header → assign to group + insert after last existing group member
  if(!_dragSrcId.startsWith('__grp_') && !_dragSrcId.startsWith('__widget') && targetId.startsWith('__grp_')) {
    const domOrder=Array.from(grid.querySelectorAll('[data-card-id],[data-group-id]')).map(el=>el.dataset.cardId||el.dataset.groupId);
    const newOrder=domOrder.filter(id=>id!==_dragSrcId);
    const cardGroups=getCardGroups();
    const grpIdx=newOrder.indexOf(targetId);
    let insertIdx=grpIdx+1;
    for(let i=grpIdx+1; i<newOrder.length; i++){
      if(newOrder[i].startsWith('__grp_')) break;
      if(cardGroups[newOrder[i]]===targetId) insertIdx=i+1;
    }
    newOrder.splice(insertIdx, 0, _dragSrcId);
    localStorage.setItem('doh_hub_card_order', JSON.stringify(newOrder));
    const m=getCardGroups(); m[_dragSrcId]=targetId;
    localStorage.setItem('doh_hub_card_groups', JSON.stringify(m));
    renderHub(); return;
  }

  const src=grid.querySelector(`[data-card-id="${_dragSrcId}"], [data-group-id="${_dragSrcId}"]`);
  const tgt=grid.querySelector(`[data-card-id="${targetId}"], [data-group-id="${targetId}"]`);
  if(!src||!tgt) return;
  const rect=tgt.getBoundingClientRect();
  grid.insertBefore(src, e.clientX<rect.left+rect.width/2 ? tgt : tgt.nextSibling);
}

function hubDragEnd(e) {
  e.currentTarget.classList.remove('hub-dragging');
  document.querySelectorAll('.hub-drop-before,.hub-drop-after,.hub-drop-assign').forEach(el=>el.classList.remove('hub-drop-before','hub-drop-after','hub-drop-assign'));
  _dragSrcId=null;
}

// ─── RENDER SCHEDULE ─────────────────────────────────────────────────────────
function renderSchedule(goalId) {
  const g=S[goalId];
  const checked=getChecked(goalId);
  const total=g.tasks.length, done=checked.size;
  const p=done/total;
  const curIdx=currentTaskIdx(g.tasks);
  const R=38, circ=2*Math.PI*R;
  const isDg=g.mode==='degen';

  const tasks=g.tasks.map((t,i)=>{
    const isChk=checked.has(i), isCur=i===curIdx, hasWhy=!!t.why;
    return `<div class="task-card${isChk?' checked':''}${isCur?' current':''}" id="tc${i}">
      <div class="tcol">
        <div class="t-time">${t.time}</div>
        ${isCur?'<div class="t-now">▶ NOW</div>':''}
      </div>
      <div class="t-body" onclick="expandTask(${i})">
        <div class="t-text">${t.text}</div>
        ${hasWhy?`<div class="t-why">${t.why}</div><div class="t-tap">tap for why ▾</div>`:''}
      </div>
      <div class="t-check" onclick="toggleTask('${goalId}',${i})">
        <span class="chk-icon">✓</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('sch-view').innerHTML=`<div id="sch-view-inner">
    <button class="sch-back" onclick="goHub()">← Back</button>
    <div class="sch-head">
      <div class="sch-ring">
        <svg viewBox="0 0 88 88">
          <circle class="r-track" cx="44" cy="44" r="${R}" stroke-width="6"/>
          <circle class="r-fill" cx="44" cy="44" r="${R}" stroke-width="6"
            id="sch-ring-fill"
            stroke-dasharray="${circ.toFixed(2)}"
            stroke-dashoffset="${ringOffset(p,R).toFixed(2)}"
            ${isDg?'style="stroke:#c800ff;filter:drop-shadow(0 0 4px #c800ff)"':''}/>
        </svg>
        <div class="sch-ring-icon">${g.icon}</div>
      </div>
      <div class="sch-info">
        <div class="sch-title">${g.title}</div>
        <div class="sch-subtitle">${g.subtitle}</div>
        <div class="sch-stats" id="sch-stats">
          <div class="sch-stat">${done}/${total} <span>done</span></div>
          <div class="sch-stat">${Math.round(p*100)}% <span>complete</span></div>
          <div class="sch-stat">🔥 ${STATE.streak.count} <span>streak</span></div>
        </div>
      </div>
    </div>
    ${g.disclaimer?`<div class="disclaimer">${g.disclaimer}</div>`:''}
    <div class="day-nav">
      <button class="dn-btn" onclick="schPrevDay('${goalId}')">&#9664; Prev</button>
      <div class="dn-center">
        <div class="dn-label">${formatDayLabel()}</div>
        <div class="dn-bar-row">
          <span class="dn-count">${done}/${total} tasks</span>
          <div class="dn-track"><div class="dn-fill" style="width:${Math.round(p*100)}%"></div></div>
        </div>
      </div>
      <button class="dn-btn" onclick="schNextDay('${goalId}')" ${isViewingToday()?'disabled':''}>Next &#9654;</button>
    </div>
    <div class="task-list">${tasks}</div>
  </div>`;

  if(curIdx>=0) setTimeout(()=>{
    const el=document.getElementById(`tc${curIdx}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },150);
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function openGoal(id) {
  window.location.href = id + '.html';
}

function goHub() {
  document.getElementById('sch-view').classList.remove('active');
  document.getElementById('profile-view').classList.remove('active');
  document.getElementById('hub-view').classList.add('active');
  renderHub();
  window.scrollTo(0,0);
}

function toggleTask(goalId, idx) {
  const checked=getChecked(goalId);
  const wasChk=checked.has(idx);
  wasChk ? checked.delete(idx) : checked.add(idx);
  saveChecked(goalId, checked);

  if (isViewingToday()) {
    const g=S[goalId];
    const xpDelta = g.mode==='degen' ? 15 : 10;
    addXP(wasChk ? -xpDelta : xpDelta);
    if(!wasChk) { touchStreak(); toast(`+${xpDelta} XP ⚡`); }
  }

  // Update card DOM
  const card=document.getElementById(`tc${idx}`);
  if(card){
    card.classList.toggle('checked',!wasChk);
    const chk=card.querySelector('.t-check');
    const icon=card.querySelector('.chk-icon');
    chk.style.background=!wasChk?'var(--acc)':'';
    chk.style.borderColor=!wasChk?'var(--acc)':'';
    icon.style.display=!wasChk?'block':'none';
  }

  // Update schedule header stats
  const done=checked.size, total=g.tasks.length, p=done/total;
  const statsEl=document.getElementById('sch-stats');
  if(statsEl) statsEl.innerHTML=`
    <div class="sch-stat">${done}/${total} <span>done</span></div>
    <div class="sch-stat">${Math.round(p*100)}% <span>complete</span></div>
    <div class="sch-stat">🔥 ${STATE.streak.count} <span>streak</span></div>`;
  const ring=document.getElementById('sch-ring-fill');
  if(ring) ring.setAttribute('stroke-dashoffset', ringOffset(p,38).toFixed(2));
  // Update day nav progress bar
  const dnCount=document.querySelector('.dn-count');
  if(dnCount) dnCount.textContent=`${done}/${total} tasks`;
  const dnFill=document.querySelector('.dn-fill');
  if(dnFill) dnFill.style.width=Math.round(p*100)+'%';
  if(p>=1 && isViewingToday()) setTimeout(()=>toast('🎉 Perfect day! Incredible.'),300);
}

function expandTask(idx) {
  const card=document.getElementById(`tc${idx}`);
  if(card) card.classList.toggle('expanded');
}

function setMode(mode) {
  STATE.mode=mode;
  localStorage.setItem('doh_mode', mode);
  document.body.classList.toggle('degen', mode==='degen');
  document.body.classList.toggle('elder', mode==='elder');
  initParticles();
  renderHub();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init() {
  if(STATE.mode==='degen') document.body.classList.add('degen');
  if(STATE.mode==='elder') document.body.classList.add('elder');
  loadState();
  renderProfileBtn();
  renderHub();
  initParticles();
  if (!getActiveId() && !sessionStorage.getItem('doh_guest_ok')) showLoginModal();
  document.addEventListener('click', e => {
    if (!e.target.closest('#profile-btn') && !e.target.closest('#profile-dropdown')) closeDropdown();
  });
})();

// ── HEATMAP TOOLTIP ──────────────────────────────────────────────────────────
(function() {
  const tip = document.getElementById('hm-tooltip');
  document.addEventListener('mouseover', function(e) {
    const el = e.target.closest('[data-tip]');
    if (!el) return;
    tip.textContent = el.dataset.tip;
    tip.classList.add('show');
  });
  document.addEventListener('mousemove', function(e) {
    if (!tip.classList.contains('show')) return;
    const x = e.clientX + 14, y = e.clientY - 36;
    tip.style.left = Math.min(x, window.innerWidth - tip.offsetWidth - 10) + 'px';
    tip.style.top  = Math.max(y, 6) + 'px';
  });
  document.addEventListener('mouseout', function(e) {
    if (!e.target.closest('[data-tip]')) return;
    tip.classList.remove('show');
  });
})();
</script>
</body>
</html>
