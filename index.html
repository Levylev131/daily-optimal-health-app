<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Optimal Health</title>
  <link rel="stylesheet" href="index.css">
  <script src="constants.js"></script>
  <script src="schedules-data.js"></script>
  <script src="utils.js"></script>
  <script src="modals.js"></script>
  <script src="health-notifications.js" defer></script>
</head>
<body>
  <div id="particles"></div>
  <div id="app">
    <div id="hub-view" class="view active"></div>
    <div id="sch-view" class="view"></div>
    <div id="profile-view" class="view"></div>
  </div>
  <div id="toast"></div>
  <div id="hm-tooltip"></div>
  <button id="profile-btn" onclick="toggleDropdown()" title="Profile"></button>
  <div id="modal-wrap"></div>

<script>
function getProfiles()      { return JSON.parse(localStorage.getItem('doh_profiles') || '{}'); }
function getActiveId()      { return localStorage.getItem('doh_active_profile') || null; }
function getActiveProfile() { const id=getActiveId(); return id ? getProfiles()[id] : null; }

function getFreezes() {
  const id = getActiveId(); if (!id) return 0;
  return parseInt(getProfiles()[id]?.freezes || 0);
}
function setFreezes(val) {
  const id = getActiveId(); if (!id) return;
  const profiles = getProfiles(); if (!profiles[id]) return;
  profiles[id].freezes = Math.max(0, Math.min(3, val));
  localStorage.setItem('doh_profiles', JSON.stringify(profiles));
}

function createProfile(name) {
  const profiles = getProfiles();
  const id = 'p_' + Date.now();
  const used = Object.values(profiles).map(p=>p.color);
  const color = AVATAR_COLORS.find(c=>!used.includes(c)) || AVATAR_COLORS[0];
  profiles[id] = { id, name: name.trim(), color, created: new Date().toISOString(), freezes: 0 };
  localStorage.setItem('doh_profiles', JSON.stringify(profiles));
  return profiles[id];
}

function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
}

function storagePrefix() {
  const id = getActiveId();
  return id ? `doh_${id}_` : 'doh_guest_';
}

// ─── HEATMAP ─────────────────────────────────────────────────────────────────
function buildHeatmapData() {
  const pid = getActiveId();
  if (!pid) return {};
  const result = {};
  const pfx = `doh_${pid}_`;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    // SPA task keys: doh_{pid}_{YYYY-MM-DD}_{goalId}
    if (k.startsWith(pfx)) {
      const dateMatch = k.slice(pfx.length).match(/^(\d{4}-\d{2}-\d{2})_/);
      if (!dateMatch) continue;
      const date = dateMatch[1];
      try { result[date] = (result[date] || 0) + JSON.parse(localStorage.getItem(k)).length; } catch {}
    }
    // Individual page task keys: ht:{pageKey}:{YYYY-MM-DD}
    const htMatch = k.match(/^ht:[^:]+:(\d{4}-\d{2}-\d{2})$/);
    if (htMatch) {
      const date = htMatch[1];
      try {
        const val = JSON.parse(localStorage.getItem(k));
        if (Array.isArray(val)) result[date] = (result[date] || 0) + val.filter(Boolean).length;
      } catch {}
    }
  }
  return result;
}

function heatColor(count, isDegen) {
  if (count === 0) return 'rgba(255,255,255,0.06)';
  if (isDegen) {
    if (count <= 3)  return '#3a0060';
    if (count <= 8)  return '#7a00aa';
    if (count <= 15) return '#c800ff';
    return '#f0a0ff';
  } else {
    if (count <= 3)  return '#1a5c32';
    if (count <= 8)  return '#1a8a50';
    if (count <= 15) return '#2dd46e';
    return '#7fffc4';
  }
}

function renderHeatmap() {
  const data = buildHeatmapData();
  const WEEKS = 20;
  const isDegen = STATE.mode === 'degen';
  const today = new Date(); today.setHours(0,0,0,0);

  // Build week columns starting from WEEKS*7 days ago
  const origin = new Date(today);
  origin.setDate(today.getDate() - (WEEKS * 7 - 1));

  const weekCols = [];
  const monthLabels = [];
  let lastMonth = -1;

  for (let w = 0; w < WEEKS; w++) {
    const days = [];
    let mLabel = '';
    for (let d = 0; d < 7; d++) {
      const dt = new Date(origin);
      dt.setDate(origin.getDate() + w * 7 + d);
      const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
      const count = data[key] || 0;
      const isFuture = dt > today;
      if (d === 0 && dt.getMonth() !== lastMonth) {
        mLabel = dt.toLocaleDateString('en-US', { month: 'short' });
        lastMonth = dt.getMonth();
      }
      days.push({ key, count, isFuture });
    }
    weekCols.push(days);
    monthLabels.push(mLabel);
  }

  const monthRow = monthLabels.map(l =>
    `<div class="hm-mlbl">${l}</div>`
  ).join('');

  const grid = weekCols.map(days =>
    `<div class="hm-week">${days.map(d =>
      `<div class="hm-day"
        style="background:${d.isFuture ? 'rgba(255,255,255,0.03)' : heatColor(d.count, isDegen)}"
        data-tip="${(()=>{ const dt=new Date(d.key+'T00:00:00'); const lbl=dt.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}); return lbl + (d.isFuture ? ' · future' : d.count ? ' · '+d.count+' task'+(d.count!==1?'s':'')+' done' : ' · no activity'); })()}"></div>`
    ).join('')}</div>`
  ).join('');

  const legendColors = isDegen
    ? ['rgba(255,255,255,0.06)', '#3a0060', '#7a00aa', '#c800ff', '#f0a0ff']
    : ['rgba(255,255,255,0.06)', '#1a5c32', '#1a8a50', '#2dd46e', '#7fffc4'];

  return `<div class="heatmap-scroll">
    <div class="heatmap-months">${monthRow}</div>
    <div class="heatmap-grid">${grid}</div>
    <div class="hm-legend">
      ${legendColors.map(c=>`<div class="hm-lswatch" style="background:${c}"></div>`).join('')}
      <span>less → more</span>
    </div>
  </div>`;
}

// ─── PROFILE PAGE ────────────────────────────────────────────────────────────
let pfDraftColor  = null;
let pfDraftAvatar = null;
let pfStatFlipped = {};

function getBestStreak() {
  const stored = parseInt(localStorage.getItem(`${storagePrefix()}best_streak`) || '0');
  return Math.max(stored, STATE.streak.count);
}
function getFreezeUses() {
  return parseInt(localStorage.getItem(`${storagePrefix()}freeze_uses`) || '0');
}
function incFreezeUses() {
  localStorage.setItem(`${storagePrefix()}freeze_uses`, getFreezeUses() + 1);
}
function toggleStatCard(name) {
  pfStatFlipped[name] = !pfStatFlipped[name];
  renderProfilePage();
}

function allTimeStats() {
  const pid = getActiveId();
  if (!pid) return { tasks: 0, daysActive: 0, tasksThisWeek: 0, daysThisMonth: 0 };
  let tasks = 0, tasksThisWeek = 0;
  const activeDays = new Set(), activeDaysThisMonth = new Set();
  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const pfx = `doh_${pid}_`;
  // Count SPA task keys (format: doh_{pid}_{YYYY-MM-DD}_{goalId})
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k.startsWith(pfx)) continue;
    const dateMatch = k.slice(pfx.length).match(/^(\d{4}-\d{2}-\d{2})_/);
    if (!dateMatch) continue;
    try {
      const val = JSON.parse(localStorage.getItem(k));
      if (Array.isArray(val) && val.length > 0) {
        const d = dateMatch[1];
        tasks += val.length;
        activeDays.add(d);
        if (new Date(d + 'T00:00:00') >= weekAgo) tasksThisWeek += val.length;
        if (d.startsWith(thisMonth)) activeDaysThisMonth.add(d);
      }
    } catch {}
  }
  // Count individual page task keys (format: ht:{pageKey}:{YYYY-MM-DD})
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    const htMatch = k.match(/^ht:[^:]+:(\d{4}-\d{2}-\d{2})$/);
    if (!htMatch) continue;
    try {
      const val = JSON.parse(localStorage.getItem(k));
      if (Array.isArray(val)) {
        const done = val.filter(Boolean).length;
        if (done > 0) {
          const d = htMatch[1];
          tasks += done;
          activeDays.add(d);
          if (new Date(d + 'T00:00:00') >= weekAgo) tasksThisWeek += done;
          if (d.startsWith(thisMonth)) activeDaysThisMonth.add(d);
        }
      }
    } catch {}
  }
  return { tasks, daysActive: activeDays.size, tasksThisWeek, daysThisMonth: activeDaysThisMonth.size };
}

function openProfile() {
  closeDropdown();
  const p = getActiveProfile();
  if (!p) { showLoginModal(); return; }
  pfDraftColor  = p.color;
  pfDraftAvatar = p.avatar || null;
  document.getElementById('hub-view').classList.remove('active');
  document.getElementById('sch-view').classList.remove('active');
  document.getElementById('profile-view').classList.add('active');
  renderProfilePage();
  window.scrollTo(0, 0);
}

function renderProfilePage() {
  const p = getActiveProfile();
  if (!p) return;
  const stats = allTimeStats();
  const lv = getLevel(STATE.mode === 'degen');
  const since = new Date(p.created).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const currentRank = getLevel(STATE.mode === 'degen').idx + 1;
  const iconBtns = AVATAR_ICONS.map(({icon, minRank}) => {
    const locked = minRank > currentRank;
    const rankName = minRank > 0 ? (LEVELS.health[minRank - 1]?.name || `Rank ${minRank}`) : '';
    const tip = locked ? `<div class="avatar-icon-tip">Rank ${minRank} — ${rankName}</div>` : '';
    return `<div class="avatar-icon-wrap">
      <div class="avatar-icon-btn ${pfDraftAvatar===icon?'active':''} ${locked?'locked':''}"
        onclick="${locked?'':` pickAvatar('${icon}')`}">${icon}</div>
      ${tip}
    </div>`;
  }).join('');

  const swatches = AVATAR_COLORS.map(c =>
    `<div class="color-swatch ${pfDraftColor===c?'active':''}"
      style="background:${c}"
      onclick="pickColor('${c}')"></div>`
  ).join('');

  const goalOptions = [
    { id:'', label:'— Not set —' },
    { id:'longevity',        label:'🌿 Longevity' },
    { id:'muscle',           label:'💪 Muscle Building' },
    { id:'cardio',           label:'❤️ Cardiovascular' },
    { id:'bone',             label:'🦴 Bone Health' },
    { id:'brain',            label:'🧠 Brain Health' },
    { id:'digestive',        label:'🥦 Digestive Health' },
    { id:'degenerates',      label:'🎮 Degenerates' },
    { id:'degenerates-plus', label:'💀 Degenerates ++' },
    { id:'super-degenerate', label:'🔥 SUPER Degenerate' },
  ];

  document.getElementById('profile-view').innerHTML = `<div id="profile-page">
    <button class="sch-back" onclick="goHub()">← Back</button>

    <div class="pf-hero">
      <div class="pf-avatar-wrap" onclick="document.getElementById('pf-color-picker').style.display='flex'">
        <div class="pf-avatar" id="pf-avatar-preview" style="background:${pfDraftColor};font-size:${pfDraftAvatar?'2.2rem':'1.8rem'}">${pfDraftAvatar || initials(p.name)}</div>
        <div class="pf-avatar-edit">✏️</div>
      </div>
      <div class="pf-name">${p.name}</div>
      <div class="pf-since">Member since ${since} · ${lv.name}</div>
      <div class="pf-color-picker" id="pf-color-picker" style="display:none">
        <div class="pf-picker-label">Avatar</div>
        <div class="pf-picker-row">${iconBtns}</div>
        <div class="pf-picker-label">Color</div>
        <div class="pf-picker-row">${swatches}</div>
      </div>
    </div>

    <div class="pf-section">
      <div class="pf-section-label">Account</div>
      <div class="pf-card">
        <div class="pf-row">
          <div class="pf-row-icon">👤</div>
          <div class="pf-row-label">Display name</div>
          <input class="pf-row-input" id="pf-name" type="text" value="${p.name}" maxlength="30" placeholder="Your name">
        </div>
        <div class="pf-row">
          <div class="pf-row-icon">✉️</div>
          <div class="pf-row-label">Email</div>
          <input class="pf-row-input" id="pf-email" type="email" value="${p.email||''}" placeholder="Optional — for future notifications">
        </div>
      </div>
    </div>

    <div class="pf-section">
      <div class="pf-section-label">Preferences</div>
      <div class="pf-card">
        <div class="pf-row">
          <div class="pf-row-icon">🎯</div>
          <div class="pf-row-label">Primary goal</div>
          <select class="pf-row-select" id="pf-goal">
            ${goalOptions.map(o=>`<option value="${o.id}" ${(p.primaryGoal||'')===o.id?'selected':''}>${o.label}</option>`).join('')}
          </select>
        </div>
        <div class="pf-row">
          <div class="pf-row-icon">🌗</div>
          <div class="pf-row-label">Default mode</div>
          <select class="pf-row-select" id="pf-mode">
            <option value="health" ${STATE.mode==='health'?'selected':''}>🌿 Health</option>
            <option value="degen"  ${STATE.mode==='degen' ?'selected':''}>💀 Degenerate</option>
          </select>
        </div>
        <div class="pf-row">
          <div class="pf-row-icon">🔔</div>
          <div class="pf-row-label">Reminder time</div>
          <input class="pf-row-input" id="pf-reminder" type="time" value="${p.reminderTime||''}"
            style="color-scheme:dark">
        </div>
      </div>
    </div>

    <div class="pf-section">
      <div class="pf-section-label">Your Stats <span style="font-size:.62rem;color:var(--muted);font-weight:400;margin-left:6px;opacity:.4">tap to flip</span></div>
      <div class="pf-stats-grid">${(()=>{
        const isDegen = STATE.mode === 'degen';
        const lvls = LEVELS[isDegen ? 'degen' : 'health'];
        const nextLv = lvls[lv.idx + 1];
        const xpToNext = nextLv ? nextLv.min - STATE.xp : null;
        const rankPct = nextLv ? Math.min(100, Math.round((STATE.xp - lv.min) / (nextLv.min - lv.min) * 100)) : 100;
        const bestStreak = getBestStreak();
        const freezeUses = getFreezeUses();
        const f = pfStatFlipped;
        return [
          // Streak
          `<div class="pf-stat-card" onclick="toggleStatCard('streak')">
            <span class="pf-stat-toggle">↕</span>
            <div class="pf-stat-tip">
              ${!f.streak
                ? `<span style="font-weight:700;color:var(--acc)">🔥 Day Streak</span>
                   <span>Check off at least one task per day to keep your streak alive.</span>
                   <span style="color:#f87171;margin-top:2px">Missing a day resets it to zero — unless you have a freeze.</span>`
                : `<span style="font-weight:700;color:var(--acc)">🏅 Best Streak</span>
                   <span>Your highest streak ever achieved. Can you beat it?</span>
                   <span style="color:#f59e0b;margin-top:2px">Best streaks are earned through consistency, not perfection.</span>`}
            </div>
            ${!f.streak
              ? `<div class="pf-stat-val" style="font-size:2.4rem;margin-left:-12px;margin-top:-6px">🔥</div><div class="pf-stat-body" style="margin-top:-6px"><div class="pf-stat-num" style="font-size:1.7rem">${STATE.streak.count}</div><div class="pf-stat-lbl">Day Streak</div></div>`
              : `<div class="pf-stat-val" style="font-size:2.4rem;margin-left:-12px;margin-top:-6px">🏅</div><div class="pf-stat-body" style="margin-top:-6px"><div class="pf-stat-num" style="font-size:1.7rem">${bestStreak}</div><div class="pf-stat-lbl">Best Streak</div></div>`}
          </div>`,
          // Tasks
          `<div class="pf-stat-card" onclick="toggleStatCard('tasks')">
            <span class="pf-stat-toggle">↕</span>
            <div class="pf-stat-tip">
              ${!f.tasks
                ? `<span style="font-weight:700;color:var(--acc)">✅ Tasks Done</span>
                   <span>Your all-time total of completed tasks across every schedule.</span>
                   <span style="color:#34d399;margin-top:2px">Every task counts, no matter how small.</span>`
                : `<span style="font-weight:700;color:var(--acc)">📆 Tasks This Week</span>
                   <span>Tasks completed in the last 7 days.</span>
                   <span style="color:#34d399;margin-top:2px">A strong week builds an unstoppable habit.</span>`}
            </div>
            ${!f.tasks
              ? `<div class="pf-stat-val" style="font-size:2rem;margin-left:-12px;margin-top:-6px">✅</div><div class="pf-stat-body" style="margin-top:-6px"><div class="pf-stat-num" style="font-size:1.7rem">${stats.tasks}</div><div class="pf-stat-lbl">Tasks Done</div></div>`
              : `<div class="pf-stat-val" style="font-size:2rem">📆</div><div class="pf-stat-body"><div class="pf-stat-num">${stats.tasksThisWeek}</div><div class="pf-stat-lbl">Tasks This Week</div></div>`}
          </div>`,
          // Rank
          `<div class="pf-stat-card" onclick="toggleStatCard('rank')">
            <span class="pf-stat-toggle">↕</span>
            <div class="pf-stat-tip">
              ${!f.rank
                ? `<span style="font-weight:700;color:var(--acc)">${isDegen ? '💀' : '🏆'} Current Rank</span>
                   <span>Your rank is determined by total XP earned across all schedules.</span>
                   <span style="color:#a78bfa;margin-top:2px">Rank ${lv.idx + 1} of 13 — keep earning XP to climb higher.</span>`
                : `<span style="font-weight:700;color:var(--acc)">📈 Next Rank Progress</span>
                   <span>${nextLv ? `${rankPct}% of the way to ${nextLv.name}.` : 'You\'ve reached the top rank.'}</span>
                   <span style="color:#a78bfa;margin-top:2px">${nextLv ? `${STATE.xp} / ${nextLv.min} XP` : '🌟 Maximum rank achieved.'}</span>`}
            </div>
            ${!f.rank
              ? `<div class="pf-stat-val" style="font-size:2rem;margin-left:-6px">${isDegen ? '💀' : '🏆'}</div><div class="pf-stat-body" style="margin-left:-6px"><div class="pf-stat-num" style="font-size:${lv.name.length>12?'.72rem':'.85rem'}">${lv.name}</div><div class="pf-stat-lbl">Current Rank</div></div>`
              : `<div class="pf-stat-val" style="font-size:2rem;margin-left:12px">📈</div><div class="pf-stat-body" style="align-items:center;margin-left:-18px;text-align:center"><div class="pf-stat-num" style="font-size:1.2rem">${nextLv ? rankPct+'%' : '🌟'}</div><div class="pf-stat-lbl">Next Rank Progress</div></div>`}
          </div>`,
          // Freezes
          `<div class="pf-stat-card" onclick="toggleStatCard('freeze')">
            <span class="pf-stat-toggle">↕</span>
            <div class="pf-stat-tip">
              ${!f.freeze
                ? `<span style="font-weight:700;color:var(--acc)">❄️ Streak Freezes</span>
                   <span>If you miss a day, a freeze is spent automatically — your streak stays intact.</span>
                   <span style="color:#f59e0b;margin-top:2px">Level up to earn one. Max 3 at a time.</span>`
                : `<span style="font-weight:700;color:var(--acc)">🛡️ Days Protected</span>
                   <span>Total times a streak freeze automatically saved your streak.</span>
                   <span style="color:#60a5fa;margin-top:2px">Each one represents a day you almost gave up — but didn't.</span>`}
            </div>
            ${!f.freeze
              ? `<div class="pf-stat-val" style="font-size:2rem">❄️</div><div class="pf-stat-body"><div class="pf-stat-num">${getFreezes()}/3</div><div class="pf-stat-lbl">Streak Freezes</div></div>`
              : `<div class="pf-stat-val" style="font-size:2rem">🛡️</div><div class="pf-stat-body"><div class="pf-stat-num">${freezeUses}</div><div class="pf-stat-lbl">Days Protected</div></div>`}
          </div>`,
          // Days Active
          `<div class="pf-stat-card" onclick="toggleStatCard('days')">
            <span class="pf-stat-toggle">↕</span>
            <div class="pf-stat-tip">
              ${!f.days
                ? `<span style="font-weight:700;color:var(--acc)">📅 Days Active</span>
                   <span>Total unique days you've completed at least one task.</span>
                   <span style="color:#60a5fa;margin-top:2px">Consistency over time is the real secret to progress.</span>`
                : `<span style="font-weight:700;color:var(--acc)">🗓️ Active This Month</span>
                   <span>Days with at least one task completed so far this month.</span>
                   <span style="color:#60a5fa;margin-top:2px">Aim to make every day count this month.</span>`}
            </div>
            ${!f.days
              ? `<div class="pf-stat-val" style="font-size:1.8rem;margin-left:-12px;margin-top:-6px">📅</div><div class="pf-stat-body" style="margin-left:0px;margin-top:-6px"><div class="pf-stat-num" style="font-size:1.7rem">${stats.daysActive}</div><div class="pf-stat-lbl">Days Active</div></div>`
              : `<div class="pf-stat-val" style="font-size:1.8rem">🗓️</div><div class="pf-stat-body"><div class="pf-stat-num" style="font-size:1.7rem">${stats.daysThisMonth}</div><div class="pf-stat-lbl">Active This Month</div></div>`}
          </div>`,
          // XP
          `<div class="pf-stat-card" onclick="toggleStatCard('xp')">
            <span class="pf-stat-toggle">↕</span>
            <div class="pf-stat-tip">
              ${!f.xp
                ? `<span style="font-weight:700;color:var(--acc)">⚡ Total XP</span>
                   <span>Earned by completing tasks. +10 XP for health tasks, +15 XP for degen tasks.</span>
                   <span style="color:#f59e0b;margin-top:2px">XP determines your rank and unlocks profile icons.</span>`
                : `<span style="font-weight:700;color:var(--acc)">🎯 XP to Next Rank</span>
                   <span>${nextLv ? `Earn ${xpToNext} more XP to reach ${nextLv.name}.` : 'You have reached the maximum rank.'}</span>
                   <span style="color:#f59e0b;margin-top:2px">${nextLv ? 'Keep going — you\'re almost there.' : '🌟 Nothing left to prove.'}</span>`}
            </div>
            ${!f.xp
              ? `<div class="pf-stat-val" style="font-size:2rem;margin-left:-18px;margin-top:-6px">⚡</div><div class="pf-stat-body" style="margin-left:-18px;margin-top:-6px"><div class="pf-stat-num">${STATE.xp} XP</div><div class="pf-stat-lbl">Total XP</div></div>`
              : `<div class="pf-stat-val" style="font-size:1.8rem;margin-left:-6px;margin-top:-6px">${xpToNext !== null ? '🎯' : '🌟'}</div><div class="pf-stat-body" style="margin-left:-6px;margin-top:-6px"><div class="pf-stat-num" style="font-size:${xpToNext!==null&&xpToNext>9999?'.85rem':'1.2rem'}">${xpToNext !== null ? xpToNext+' XP' : 'MAX'}</div><div class="pf-stat-lbl">XP to Next Rank</div></div>`}
          </div>`
        ].join('');
      })()}</div>
    </div>

    <div class="pf-section">
      <div class="pf-section-label">Activity — last 20 weeks</div>
      <div class="pf-card" style="padding:16px 18px">
        ${renderHeatmap()}
      </div>
    </div>

    <button class="pf-save" onclick="saveProfile()">Save Changes</button>
  </div>`;
}

function pickColor(color) {
  pfDraftColor = color;
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('active', s.style.background === color || s.style.backgroundColor === color);
  });
  const preview = document.getElementById('pf-avatar-preview');
  if (preview) preview.style.background = color;
}

function pickAvatar(icon) {
  const data = AVATAR_ICONS.find(i => i.icon === icon);
  if (data && data.minRank > getLevel(STATE.mode === 'degen').idx + 1) return;
  pfDraftAvatar = pfDraftAvatar === icon ? null : icon; // tap same icon to deselect
  document.querySelectorAll('.avatar-icon-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === pfDraftAvatar);
  });
  const preview = document.getElementById('pf-avatar-preview');
  if (preview) {
    preview.textContent = pfDraftAvatar || initials(getActiveProfile()?.name || '');
    preview.style.fontSize = pfDraftAvatar ? '2.2rem' : '1.8rem';
  }
}

function saveProfile() {
  const p = getActiveProfile();
  if (!p) return;
  const name    = document.getElementById('pf-name')?.value.trim()     || p.name;
  const email   = document.getElementById('pf-email')?.value.trim()    || '';
  const goal    = document.getElementById('pf-goal')?.value            || '';
  const mode    = document.getElementById('pf-mode')?.value            || STATE.mode;
  const reminder= document.getElementById('pf-reminder')?.value        || '';

  if (!name) { toast('Name cannot be empty ✗'); return; }

  const profiles = getProfiles();
  profiles[p.id] = { ...p, name, email, primaryGoal: goal, reminderTime: reminder, color: pfDraftColor || p.color, avatar: pfDraftAvatar };
  localStorage.setItem('doh_profiles', JSON.stringify(profiles));

  if (mode !== STATE.mode) setMode(mode);

  renderProfileBtn();
  toast('Profile saved ✓');
  // Refresh the page to reflect name/color changes
  renderProfilePage();
}

// ─── PROFILE BUTTON + DROPDOWN ───────────────────────────────────────────────
function renderProfileBtn() {
  const btn = document.getElementById('profile-btn');
  const p = getActiveProfile();
  if (p) {
    btn.textContent = p.avatar || initials(p.name);
    btn.style.background = p.color;
    btn.style.color = '#000';
    btn.style.fontSize = p.avatar ? '1.2rem' : '.82rem';
    btn.title = p.name;
    btn.style.border = `2px solid ${p.color}`;
  } else {
    btn.textContent = '👤';
    btn.style.background = 'var(--glass)';
    btn.style.color = 'var(--muted)';
    btn.title = 'Log in';
    btn.style.border = '2px solid var(--glass-b)';
    btn.style.fontSize = '.9rem';
  }
}

function toggleDropdown() {
  if (document.getElementById('profile-dropdown')) { closeDropdown(); return; }
  const p = getActiveProfile();
  const dd = document.createElement('div');
  dd.id = 'profile-dropdown';
  dd.className = 'p-dropdown';
  if (p) {
    dd.innerHTML = `
      <div class="p-dd-name">👤 ${p.name}</div>
      <div class="p-dd-item" onclick="openProfile()">🪪 View Profile</div>
      <div class="p-dd-item" onclick="showExportModal()">📤 Export / Import data</div>
      <div class="p-dd-item" onclick="showSwitchModal()">🔄 Switch profile</div>
      <div class="p-dd-item danger" onclick="signOut()">← Sign out</div>`;
  } else {
    dd.innerHTML = `<div class="p-dd-item" onclick="closeDropdown();showLoginModal()">→ Log in / Create profile</div>`;
  }
  document.body.appendChild(dd);
}

function closeDropdown() { document.getElementById('profile-dropdown')?.remove(); }

// ─── RENDER HUB ──────────────────────────────────────────────────────────────
function disableNotifFromHub(pageKey) {
  localStorage.removeItem('notif:' + pageKey + ':enabled');
  localStorage.removeItem('notif:' + pageKey + ':tasks');
  if (window.dohNotifications) window.dohNotifications.schedule();
  renderHub();
}

function renderHub() {
  const isDegen = STATE.mode==='degen';
  const lv = getLevel(isDegen);
  const xpIn = STATE.xp - lv.min;
  const xpFor = lv.next ? lv.next.min - lv.min : 1;
  const xpPct = lv.next ? Math.min(100,xpIn/xpFor*100) : 100;
  const done = todayDone();
  const hGoals = ['longevity','muscle','cardio','bone','brain','digestive'];
  const dGoals = ['degenerates','degenerates-plus','super-degenerate'];
  const customScheds = JSON.parse(localStorage.getItem(storagePrefix()+'cscheds') || '[]');

  const NOTIF_NAMES = {
    'bone-health':           { name: 'Bone Health',          icon: '🦴' },
    'brain-health':          { name: 'Brain Health',          icon: '🧠' },
    'cardiovascular-health': { name: 'Cardiovascular Health', icon: '❤️' },
    'digestive-health':      { name: 'Digestive Health',      icon: '🌿' },
    'longevity':             { name: 'Longevity',             icon: '🌿' },
    'muscle-building':       { name: 'Muscle Building',       icon: '💪' },
  };
  const enabledKeys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('notif:') && k.endsWith(':enabled')) enabledKeys.push(k.slice(6,-8));
  }
  const notifItems = enabledKeys.length === 0
    ? '<div class="notif-empty">No reminders set — open a schedule and tap 🔔</div>'
    : enabledKeys.map(pk => {
        const info = NOTIF_NAMES[pk] || { name: pk, icon: '🔔' };
        return `<div class="notif-item">
          <div class="notif-item-name">${info.icon} ${info.name}</div>
          <button class="notif-off-btn" onclick="disableNotifFromHub('${pk}')">Turn off</button>
        </div>`;
      }).join('');

  const card = id => {
    const g=S[id], p=pct(id), r=22, circ=2*Math.PI*r;
    const off=ringOffset(p,r);
    const isDg=g.mode==='degen';
    return `<div class="goal-card" onclick="openGoal('${id}')">
      <div class="ring-wrap">
        <svg viewBox="0 0 50 50">
          <circle class="r-track" cx="25" cy="25" r="${r}"/>
          <circle class="r-fill" cx="25" cy="25" r="${r}"
            stroke-dasharray="${circ.toFixed(2)}"
            stroke-dashoffset="${off.toFixed(2)}"
            ${isDg?'style="stroke:#c800ff;filter:drop-shadow(0 0 3px #c800ff)"':''}/>
        </svg>
        <div class="ring-icon">${g.icon}</div>
      </div>
      <div class="card-info">
        <div class="card-title">${g.title}</div>
        <div class="card-desc">${g.subtitle}</div>
        <div class="card-pct">${p>0?Math.round(p*100)+'% today':'Start →'}</div>
      </div>
    </div>`;
  };

  document.getElementById('hub-view').innerHTML=`<div id="hub">
    ${false /* DEGEN HIDDEN — change false to true to restore */ ? `
    <div class="mode-toggle">
      <button class="mode-btn ${!isDegen?'active':''}" onclick="setMode('health')">🌿 Health</button>
      <button class="mode-btn ${isDegen?'active':''}" onclick="setMode('degen')">💀 Degenerate</button>
    </div>` : ''}
    <div class="hub-header">
      <h1 class="hub-title">Daily Optimal Health</h1>
      <p class="hub-sub">Choose a goal. Check off your day. Stack wins.</p>
      <div class="stats-row">
        <div class="stat-pill">🔥 ${STATE.streak.count} <span class="lbl">day streak</span></div>
        ${getFreezes()>0?`<div class="stat-pill" title="Streak freeze tokens — if you miss a day, one is spent automatically to protect your streak. Earn more by leveling up (max 3).">❄️ ${getFreezes()} <span class="lbl">freeze${getFreezes()!==1?'s':''}</span></div>`:''}
        <div class="stat-pill">⚡ ${STATE.xp} <span class="lbl">XP</span></div>
        <div class="stat-pill stat-pill-lvl" onclick="showLevelsModal()">🏆 ${lv.name}</div>
        ${done>0?`<div class="stat-pill">✅ ${done} <span class="lbl">done today</span></div>`:''}
      </div>
      ${lv.next?`<div class="xp-wrap">
        <div class="xp-meta"><span>${lv.name}</span><span>${xpIn}/${xpFor} XP → ${lv.next.name}</span></div>
        <div class="xp-track"><div class="xp-fill" style="width:${xpPct.toFixed(1)}%"></div></div>
      </div>`:''}
    </div>
    <div class="sec-label">Health Goals</div>
    <div class="goal-grid">${hGoals.map(card).join('')}</div>
    ${false /* DEGEN HIDDEN — change false to true to restore */ ? `
    <div class="degen-div"><span class="degen-label">Degenerate Fucks</span></div>
    <div class="sec-label">Recovery Tiers</div>
    <div class="goal-grid">${dGoals.map(card).join('')}</div>` : ''}
    ${customScheds.length > 0 ? `
    <div class="sec-label" style="margin-top:28px">My Schedules</div>
    <div class="goal-grid">${customScheds.map(cs => {
      const r=22, circ=2*Math.PI*r;
      const pfx = storagePrefix();
      const today = activeKey();
      const checked = JSON.parse(localStorage.getItem(`${pfx}${cs.id}_${today}`) || '[]');
      const p = cs.tasks.length ? checked.length / cs.tasks.length : 0;
      const off = ringOffset(p, r);
      return `<div class="goal-card" onclick="window.location.href='custom-view.html#${cs.id}'">
        <div class="ring-wrap">
          <svg viewBox="0 0 50 50">
            <circle class="r-track" cx="25" cy="25" r="${r}"/>
            <circle class="r-fill" cx="25" cy="25" r="${r}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>
          </svg>
          <div class="ring-icon">${cs.icon}</div>
        </div>
        <div class="card-info">
          <div class="card-title">${cs.title}</div>
          <div class="card-desc">${cs.subtitle || cs.tasks.length + ' tasks'}</div>
          <div class="card-pct">${p>0 ? Math.round(p*100)+'% today' : 'Start →'}</div>
        </div>
      </div>`;
    }).join('')}
    </div>
    <div style="text-align:center;margin-bottom:20px">
      <button onclick="window.location.href='schedule-builder.html'" style="background:none;border:1px solid var(--glass-b);color:var(--muted);border-radius:20px;padding:6px 18px;font-size:.78rem;cursor:pointer;transition:var(--trans)" onmouseover="this.style.borderColor='var(--acc)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--glass-b)';this.style.color='var(--muted)'">＋ New Schedule</button>
    </div>` : ''}
    <div class="sec-label" style="margin-top:28px">Tools &amp; Trackers</div>
    <div class="goal-grid">
      <div class="goal-card" onclick="window.location.href='tools.html'">
        <div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="22"/></svg><div class="ring-icon">🛠️</div></div>
        <div class="card-info">
          <div class="card-title">Tools &amp; Trackers</div>
          <div class="card-desc">Journal, water, mood, supplements, sleep log, and your personal checklist</div>
          <div class="card-pct">Open →</div>
        </div>
      </div>
      <div class="goal-card" onclick="window.location.href='workout-log.html'">
        <div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="22"/></svg><div class="ring-icon">💪</div></div>
        <div class="card-info">
          <div class="card-title">Workout Logger</div>
          <div class="card-desc">Log exercises, sets, reps, and weight. Track progressive overload day by day.</div>
          <div class="card-pct">Open →</div>
        </div>
      </div>
      <div class="goal-card" onclick="window.location.href='nutrition-log.html'">
        <div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="22"/></svg><div class="ring-icon">🥗</div></div>
        <div class="card-info">
          <div class="card-title">Nutrition Log</div>
          <div class="card-desc">Track meals and macros — protein, carbs, fat, and calories across the day.</div>
          <div class="card-pct">Open →</div>
        </div>
      </div>
      <div class="goal-card" onclick="window.location.href='fasting-tracker.html'">
        <div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="22"/></svg><div class="ring-icon">⏱️</div></div>
        <div class="card-info">
          <div class="card-title">Fasting Tracker</div>
          <div class="card-desc">Start and track intermittent fasts. Set goals, monitor progress, log history.</div>
          <div class="card-pct">Open →</div>
        </div>
      </div>
      <div class="goal-card" onclick="window.location.href='habit-tracker.html'">
        <div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="22"/></svg><div class="ring-icon">✅</div></div>
        <div class="card-info">
          <div class="card-title">Habit Tracker</div>
          <div class="card-desc">Build custom daily habits. Track streaks and stay consistent over time.</div>
          <div class="card-pct">Open →</div>
        </div>
      </div>
      <div class="goal-card" onclick="window.location.href='challenges.html'">
        <div class="ring-wrap"><svg viewBox="0 0 50 50"><circle class="r-track" cx="25" cy="25" r="22"/></svg><div class="ring-icon">🏆</div></div>
        <div class="card-info">
          <div class="card-title">30-Day Challenges</div>
          <div class="card-desc">Pick a challenge, check in daily, and build a new habit in 30 days.</div>
          <div class="card-pct">Open →</div>
        </div>
      </div>
    </div>
    <div class="sec-label" style="margin-top:28px">🔔 Reminders <span class="notif-count">${enabledKeys.length}/3</span></div>
    <div class="notif-panel">${notifItems}</div>
  </div>`;
}

// ─── RENDER SCHEDULE ─────────────────────────────────────────────────────────
function renderSchedule(goalId) {
  const g=S[goalId];
  const checked=getChecked(goalId);
  const total=g.tasks.length, done=checked.size;
  const p=done/total;
  const curIdx=currentTaskIdx(g.tasks);
  const R=38, circ=2*Math.PI*R;
  const isDg=g.mode==='degen';

  const tasks=g.tasks.map((t,i)=>{
    const isChk=checked.has(i), isCur=i===curIdx, hasWhy=!!t.why;
    return `<div class="task-card${isChk?' checked':''}${isCur?' current':''}" id="tc${i}">
      <div class="tcol">
        <div class="t-time">${t.time}</div>
        ${isCur?'<div class="t-now">▶ NOW</div>':''}
      </div>
      <div class="t-body" onclick="expandTask(${i})">
        <div class="t-text">${t.text}</div>
        ${hasWhy?`<div class="t-why">${t.why}</div><div class="t-tap">tap for why ▾</div>`:''}
      </div>
      <div class="t-check" onclick="toggleTask('${goalId}',${i})">
        <span class="chk-icon">✓</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('sch-view').innerHTML=`<div id="sch-view-inner">
    <button class="sch-back" onclick="goHub()">← Back</button>
    <div class="sch-head">
      <div class="sch-ring">
        <svg viewBox="0 0 88 88">
          <circle class="r-track" cx="44" cy="44" r="${R}" stroke-width="6"/>
          <circle class="r-fill" cx="44" cy="44" r="${R}" stroke-width="6"
            id="sch-ring-fill"
            stroke-dasharray="${circ.toFixed(2)}"
            stroke-dashoffset="${ringOffset(p,R).toFixed(2)}"
            ${isDg?'style="stroke:#c800ff;filter:drop-shadow(0 0 4px #c800ff)"':''}/>
        </svg>
        <div class="sch-ring-icon">${g.icon}</div>
      </div>
      <div class="sch-info">
        <div class="sch-title">${g.title}</div>
        <div class="sch-subtitle">${g.subtitle}</div>
        <div class="sch-stats" id="sch-stats">
          <div class="sch-stat">${done}/${total} <span>done</span></div>
          <div class="sch-stat">${Math.round(p*100)}% <span>complete</span></div>
          <div class="sch-stat">🔥 ${STATE.streak.count} <span>streak</span></div>
        </div>
      </div>
    </div>
    ${g.disclaimer?`<div class="disclaimer">${g.disclaimer}</div>`:''}
    <div class="day-nav">
      <button class="dn-btn" onclick="schPrevDay('${goalId}')">&#9664; Prev</button>
      <div class="dn-center">
        <div class="dn-label">${formatDayLabel()}</div>
        <div class="dn-bar-row">
          <span class="dn-count">${done}/${total} tasks</span>
          <div class="dn-track"><div class="dn-fill" style="width:${Math.round(p*100)}%"></div></div>
        </div>
      </div>
      <button class="dn-btn" onclick="schNextDay('${goalId}')" ${isViewingToday()?'disabled':''}>Next &#9654;</button>
    </div>
    <div class="task-list">${tasks}</div>
  </div>`;

  if(curIdx>=0) setTimeout(()=>{
    const el=document.getElementById(`tc${curIdx}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },150);
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function openGoal(id) {
  window.location.href = id + '.html';
}

function goHub() {
  document.getElementById('sch-view').classList.remove('active');
  document.getElementById('profile-view').classList.remove('active');
  document.getElementById('hub-view').classList.add('active');
  renderHub();
  window.scrollTo(0,0);
}

function toggleTask(goalId, idx) {
  const checked=getChecked(goalId);
  const wasChk=checked.has(idx);
  wasChk ? checked.delete(idx) : checked.add(idx);
  saveChecked(goalId, checked);

  if (isViewingToday()) {
    const g=S[goalId];
    const xpDelta = g.mode==='degen' ? 15 : 10;
    addXP(wasChk ? -xpDelta : xpDelta);
    if(!wasChk) { touchStreak(); toast(`+${xpDelta} XP ⚡`); }
  }

  // Update card DOM
  const card=document.getElementById(`tc${idx}`);
  if(card){
    card.classList.toggle('checked',!wasChk);
    const chk=card.querySelector('.t-check');
    const icon=card.querySelector('.chk-icon');
    chk.style.background=!wasChk?'var(--acc)':'';
    chk.style.borderColor=!wasChk?'var(--acc)':'';
    icon.style.display=!wasChk?'block':'none';
  }

  // Update schedule header stats
  const done=checked.size, total=g.tasks.length, p=done/total;
  const statsEl=document.getElementById('sch-stats');
  if(statsEl) statsEl.innerHTML=`
    <div class="sch-stat">${done}/${total} <span>done</span></div>
    <div class="sch-stat">${Math.round(p*100)}% <span>complete</span></div>
    <div class="sch-stat">🔥 ${STATE.streak.count} <span>streak</span></div>`;
  const ring=document.getElementById('sch-ring-fill');
  if(ring) ring.setAttribute('stroke-dashoffset', ringOffset(p,38).toFixed(2));
  // Update day nav progress bar
  const dnCount=document.querySelector('.dn-count');
  if(dnCount) dnCount.textContent=`${done}/${total} tasks`;
  const dnFill=document.querySelector('.dn-fill');
  if(dnFill) dnFill.style.width=Math.round(p*100)+'%';
  if(p>=1 && isViewingToday()) setTimeout(()=>toast('🎉 Perfect day! Incredible.'),300);
}

function expandTask(idx) {
  const card=document.getElementById(`tc${idx}`);
  if(card) card.classList.toggle('expanded');
}

function setMode(mode) {
  STATE.mode=mode;
  localStorage.setItem('doh_mode', mode);
  document.body.classList.toggle('degen', mode==='degen');
  initParticles();
  renderHub();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init() {
  if(STATE.mode==='degen') document.body.classList.add('degen');
  loadState();
  renderProfileBtn();
  renderHub();
  initParticles();
  if (!getActiveId()) showLoginModal();
  document.addEventListener('click', e => {
    if (!e.target.closest('#profile-btn') && !e.target.closest('#profile-dropdown')) closeDropdown();
  });
})();

// ── HEATMAP TOOLTIP ──────────────────────────────────────────────────────────
(function() {
  const tip = document.getElementById('hm-tooltip');
  document.addEventListener('mouseover', function(e) {
    const el = e.target.closest('[data-tip]');
    if (!el) return;
    tip.textContent = el.dataset.tip;
    tip.classList.add('show');
  });
  document.addEventListener('mousemove', function(e) {
    if (!tip.classList.contains('show')) return;
    const x = e.clientX + 14, y = e.clientY - 36;
    tip.style.left = Math.min(x, window.innerWidth - tip.offsetWidth - 10) + 'px';
    tip.style.top  = Math.max(y, 6) + 'px';
  });
  document.addEventListener('mouseout', function(e) {
    if (!e.target.closest('[data-tip]')) return;
    tip.classList.remove('show');
  });
})();
</script>
</body>
