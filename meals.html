<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Recipes — Daily Optimal Health</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --acc: #2dd46e; --acc2: #1a8a50; --glow: rgba(45,212,110,0.35);
      --bg1: #061a0c; --bg2: #0d4a24; --bg3: #061a0c;
      --glass: rgba(255,255,255,0.07); --glass-b: rgba(255,255,255,0.13);
      --glass-h: rgba(255,255,255,0.12);
      --text: #f0fff4; --muted: rgba(240,255,244,0.55);
      --r: 14px; --r-sm: 10px;
      --trans: all 0.28s cubic-bezier(.4,0,.2,1);
      --amber: #f5a623; --blue: #3ecfff;
    }
    html { min-height: 100%; scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 400% 400%;
      animation: gradShift 18s ease infinite;
      color: var(--text); min-height: 100vh; overflow-x: hidden;
    }
    @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

    .top-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px; max-width: 900px; margin: 0 auto;
      border-bottom: 1px solid var(--glass-b);
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,26,12,0.85); backdrop-filter: blur(16px);
    }
    .back-btn { color: var(--muted); text-decoration: none; font-size: .88rem; font-weight: 600; transition: color .2s; background: none; border: none; cursor: pointer; white-space: nowrap; }
    .back-btn:hover { color: var(--acc); }
    .top-title { flex: 1; text-align: center; font-size: 1rem; font-weight: 800; text-shadow: 0 0 20px var(--glow); }
    .top-spacer { width: 60px; }

    .page { max-width: 900px; margin: 0 auto; padding: clamp(16px,4vw,28px) clamp(12px,3vw,20px) 100px; }

    .hero { text-align: center; padding: clamp(20px,4vw,32px) 0 clamp(14px,3vw,24px); }
    .hero-emoji { font-size: clamp(2.5rem,7vw,4rem); display: block; margin-bottom: 10px; filter: drop-shadow(0 0 16px var(--glow)); }
    .hero-title {
      font-size: clamp(1.6rem,5vw,2.6rem); font-weight: 900; letter-spacing: -1px; line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, var(--acc));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px;
    }
    .hero-sub { color: var(--muted); font-size: clamp(.84rem,2vw,.98rem); max-width: 480px; margin: 0 auto; line-height: 1.6; }

    /* CATEGORY FILTER */
    .filter-bar {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; padding-top: 4px;
    }
    .filter-btn {
      padding: 7px 14px; border-radius: 20px; border: 1px solid var(--glass-b);
      background: var(--glass); color: var(--muted); font-size: .78rem; font-weight: 700;
      cursor: pointer; transition: var(--trans); font-family: inherit; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--acc); color: var(--text); }
    .filter-btn.active { background: var(--acc); color: #000; border-color: var(--acc); box-shadow: 0 0 10px var(--glow); }

    /* MEAL INDEX (sticky sidebar style top strip) */
    .meal-index {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px;
    }
    .index-pill {
      background: var(--glass); border: 1px solid var(--glass-b); border-radius: 20px;
      padding: 5px 12px; font-size: .75rem; color: var(--muted); cursor: pointer;
      transition: var(--trans); text-decoration: none; display: inline-block;
    }
    .index-pill:hover { border-color: var(--acc); color: var(--acc); }

    /* SECTION LABEL */
    .sec-label {
      font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.4px;
      color: var(--muted); margin: 28px 0 14px; display: flex; align-items: center; gap: 10px;
    }
    .sec-label::after { content:''; flex:1; height:1px; background: var(--glass-b); }

    /* RECIPE CARD */
    .recipe-card {
      background: var(--glass); border: 1px solid var(--glass-b);
      border-radius: var(--r); backdrop-filter: blur(12px);
      margin-bottom: 20px; overflow: hidden;
      scroll-margin-top: 72px;
      transition: border-color .2s;
    }
    .recipe-card.highlight-anchor { border-color: var(--acc); box-shadow: 0 0 24px var(--glow); }

    .recipe-header {
      display: flex; align-items: center; gap: 16px;
      padding: clamp(14px,3vw,20px); cursor: pointer;
      transition: background .15s; user-select: none;
    }
    .recipe-header:hover { background: var(--glass-h); }
    .recipe-emoji { font-size: clamp(2rem,5vw,2.8rem); flex-shrink: 0; }
    .recipe-meta { flex: 1; min-width: 0; }
    .recipe-name { font-size: clamp(.95rem,2.5vw,1.15rem); font-weight: 900; margin-bottom: 5px; line-height: 1.2; }
    .recipe-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .rtag {
      font-size: .65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .6px;
    }
    .rtag-cat { background: rgba(45,212,110,0.15); color: var(--acc); }
    .rtag-time { background: rgba(62,207,255,0.12); color: var(--blue); }
    .rtag-diff { background: var(--glass-b); color: var(--muted); }
    .recipe-macros { display: flex; gap: 8px; flex-shrink: 0; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .macro-box { text-align: center; }
    .macro-val { font-size: .9rem; font-weight: 900; line-height: 1; }
    .macro-lbl { font-size: .6rem; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
    .macro-box.p .macro-val { color: var(--acc); }
    .macro-box.c .macro-val { color: var(--blue); }
    .macro-box.f .macro-val { color: var(--amber); }
    .expand-arrow { color: var(--muted); font-size: .8rem; transition: transform .25s; margin-left: 10px; flex-shrink: 0; }
    .recipe-card.open .expand-arrow { transform: rotate(180deg); }

    /* RECIPE BODY */
    .recipe-body {
      max-height: 0; overflow: hidden;
      transition: max-height .4s cubic-bezier(.4,0,.2,1);
      border-top: 1px solid transparent;
    }
    .recipe-card.open .recipe-body {
      max-height: 1200px;
      border-top-color: var(--glass-b);
    }
    .recipe-inner { padding: clamp(14px,3vw,22px); }

    .recipe-cols { display: grid; grid-template-columns: 1fr 1.6fr; gap: 20px; }
    @media(max-width:580px){ .recipe-cols { grid-template-columns: 1fr; } }

    .col-label {
      font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.1px;
      color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .col-label::after { content:''; flex:1; height:1px; background: var(--glass-b); }

    /* INGREDIENTS */
    .ing-list { list-style: none; }
    .ing-list li {
      display: flex; align-items: baseline; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: .82rem; line-height: 1.4;
    }
    .ing-list li:last-child { border-bottom: none; }
    .ing-amt { color: var(--acc); font-weight: 700; font-size: .78rem; white-space: nowrap; flex-shrink: 0; }

    /* STEPS */
    .steps-list { list-style: none; counter-reset: steps; }
    .steps-list li {
      counter-increment: steps; display: flex; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: .82rem; line-height: 1.6; align-items: flex-start;
    }
    .steps-list li:last-child { border-bottom: none; }
    .step-num {
      width: 22px; height: 22px; border-radius: 50%; background: rgba(45,212,110,0.2);
      color: var(--acc); font-size: .7rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }

    /* WHY BOX */
    .why-box {
      background: rgba(45,212,110,0.07); border: 1px solid rgba(45,212,110,0.25);
      border-radius: var(--r-sm); padding: 12px 14px; margin-top: 14px; font-size: .8rem; line-height: 1.6;
    }
    .why-box strong { color: var(--acc); }

    /* TIPS */
    .tips-box {
      background: rgba(245,166,35,0.07); border: 1px solid rgba(245,166,35,0.25);
      border-radius: var(--r-sm); padding: 12px 14px; margin-top: 10px; font-size: .78rem; line-height: 1.6; color: var(--amber);
    }

    /* BACK TO TOP */
    .back-top {
      display: block; text-align: center; color: var(--muted); font-size: .76rem;
      font-weight: 700; cursor: pointer; margin-top: 6px; margin-bottom: 4px;
      padding: 6px; transition: color .2s; background: none; border: none; width: 100%; font-family: inherit;
    }
    .back-top:hover { color: var(--acc); }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--acc); color: #000; border-radius: 28px; padding: 10px 22px; font-weight: 800; font-size: .9rem; z-index: 999; transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .35s; opacity: 0; white-space: nowrap; box-shadow: 0 4px 20px var(--glow); }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
  <script src="health-notifications.js" defer></script>
</head>
<body>

<div class="top-bar">

</div>

// ── RENDER ────────────────────────────────────────────────────────────────────
let activeFilter = 'all';

function mealCard(m) {
  return `<div class="recipe-card" id="${m.id}" data-cats="${m.categories.join(' ')}">
    <div class="recipe-header" onclick="toggleRecipe('${m.id}')">
      <span class="recipe-emoji">${m.emoji}</span>
      <div class="recipe-meta">
        <div class="recipe-name">${m.name}</div>
        <div class="recipe-tags">
          ${m.categories.map(c => `<span class="rtag rtag-cat">${c.replace('-',' ')}</span>`).join('')}
          <span class="rtag rtag-time">⏱ ${m.time}</span>
          <span class="rtag rtag-diff">${m.difficulty}</span>
        </div>
      </div>
      <div class="recipe-macros">
        <div class="macro-box p"><div class="macro-val">${m.protein}</div><div class="macro-lbl">Protein</div></div>
        <div class="macro-box c"><div class="macro-val">${m.carbs}</div><div class="macro-lbl">Carbs</div></div>
        <div class="macro-box f"><div class="macro-val">${m.fat}</div><div class="macro-lbl">Fat</div></div>
      </div>
      <span class="expand-arrow">▼</span>
    </div>
    <div class="recipe-body">
      <div class="recipe-inner">
        <div class="recipe-cols">
          <div>
            <div class="col-label">Ingredients</div>
            <ul class="ing-list">${m.ingredients.map(i => `<li><span class="ing-amt">${i.amt}</span>${i.item}</li>`).join('')}</ul>
          </div>
          <div>
            <div class="col-label">Instructions</div>
            <ol class="steps-list">${m.steps.map((s,i) => `<li><span class="step-num">${i+1}</span>${s}</li>`).join('')}</ol>
          </div>
        </div>
        <div class="why-box"><strong>Why this works for creatine:</strong> ${m.why}</div>
        ${m.tips ? `<div class="tips-box">💡 <strong>Tips:</strong> ${m.tips}</div>` : ''}
        <button class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Back to top</button>
      </div>
    </div>
  </div>`;
}

function renderAll() {
  const filtered = activeFilter === 'all' ? RECIPES : RECIPES.filter(m => m.categories.includes(activeFilter));
  document.getElementById('recipeList').innerHTML = filtered.length
    ? filtered.map(mealCard).join('')
    : '<div style="text-align:center;color:var(--muted);padding:40px;font-size:.9rem">No meals match this filter.</div>';
  buildIndex(filtered);
}

function buildIndex(list) {
  document.getElementById('mealIndex').innerHTML = list.map(m =>
    `<a class="index-pill" href="#${m.id}" onclick="openAndScroll('${m.id}',event)">${m.emoji} ${m.name}</a>`
  ).join('');
}

function toggleRecipe(id) {
  document.getElementById(id).classList.toggle('open');
}

function openAndScroll(id, e) {
  e.preventDefault();
  const card = document.getElementById(id);
  if (!card) return;
  if (!card.classList.contains('open')) card.classList.add('open');
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

function filterMeals(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ── DEEP LINK from creatine.html ──────────────────────────────────────────────
function handleHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const card = document.getElementById(hash);
  if (!card) return;
  card.classList.add('open');
  card.classList.add('highlight-anchor');
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 120);
  setTimeout(() => card.classList.remove('highlight-anchor'), 2500);
}

renderAll();
handleHash();
window.addEventListener('hashchange', handleHash);
</script>
