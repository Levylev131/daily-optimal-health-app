    .bp-page { max-width: 680px; margin: 0 auto; padding: 32px 20px 80px; }

    .bp-sub { text-align: center; color: var(--muted); font-size: .88rem; font-style: italic; margin-bottom: 36px; }

    }

      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--glass-b);

    .workout-row:last-child { border-bottom: none; padding-bottom: 0; }
    .workout-row:first-child { padding-top: 0; }
    .workout-name { font-size: .9rem; font-weight: 600; color: var(--text); }
    .workout-note { font-size: .76rem; color: var(--muted); margin-top: 2px; }
    .workout-sets { font-size: .82rem; font-weight: 700; color: var(--acc); white-space: nowrap; margin-left: 12px; }
    .bp-section-label {
      font-size: 1.1rem; font-weight: 900; letter-spacing: .5px;
      color: var(--text); margin: 32px 0 12px 2px;
    }
    .workout-tabs { display: flex; gap: 8px; }
    .workout-tab {
      flex: 1; padding: 10px 0; border-radius: 10px;
      background: var(--glass); border: 1px solid var(--glass-b);
      color: var(--muted); font-size: .82rem; font-weight: 700;
      letter-spacing: .5px; cursor: pointer; transition: all .2s;
      text-align: center;
    }
    .workout-tab:hover { border-color: var(--acc); color: var(--text); }
    .workout-tab.active { background: var(--acc); color: #000; border-color: var(--acc); box-shadow: 0 0 14px var(--glow); }
    .workout-panel { display: none; margin-top: 12px; }
    .workout-panel.active { display: block; }

          { heading: 'Common issues', list: ['Patellofemoral syndrome (runner\'s knee / kneecap pain)', 'IT band syndrome (lateral knee pain in runners)', 'ACL and meniscus tears (acute trauma)', 'Patellar tendinopathy (jumper\'s knee)'] },

          ],

          { heading: 'Key habits', list: ['Brace your core before any lift — creates intra-abdominal pressure to protect the lumbar spine', 'Hip hinge practice daily — deadlift pattern is the spine\'s best friend when done correctly', 'Avoid sustained flexion (long sitting with a rounded lower back)', 'Stretch hip flexors — tight hip flexors pull the pelvis forward and stress the lumbar spine'] },

          { heading: 'Key habits', list: ['Go barefoot at home to strengthen intrinsic foot muscles', 'Toe spreads and short-foot exercises daily', 'Ankle circles and calf stretches', 'Consider minimalist footwear gradually'] },
          { heading: 'Common issues', list: ['Plantar fasciitis', 'Flat feet / fallen arches', 'Ankle instability', 'Bunions'] },
        ],

          ],

    };

    const part = new URLSearchParams(window.location.search).get('part') || 'head';
    const data = PARTS[part] || PARTS.head;

    document.title = data.title + ' — Daily Optimal Health';
    document.getElementById('part-title').textContent = data.title;
    document.getElementById('part-sub').textContent = data.sub;

    const content = document.getElementById('part-content');

    function makeWorkoutCard(heading, list) {
      const card = document.createElement('div');
      card.className = 'bp-card';
      card.innerHTML = `<h2>${heading}</h2>` +
        list.map(w => `
          <div class="workout-row">
            <div>
              <div class="workout-name">${w.name}</div>
              ${w.note ? `<div class="workout-note">${w.note}</div>` : ''}
            </div>
            <div class="workout-sets">${w.sets}</div>
          </div>`).join('');
      return card;
    }

    data.sections.forEach(s => {
      const card = document.createElement('div');
      card.className = 'bp-card';
      let inner = `<h2>${s.heading}</h2>`;
      if (s.body) inner += `<p>${s.body}</p>`;
      if (s.list) inner += `<ul>${s.list.map(i => `<li>${i}</li>`).join('')}</ul>`;
      card.innerHTML = inner;
      content.appendChild(card);
    });

    if (data.workouts) {
      const lbl = document.createElement('div');
      lbl.className = 'bp-section-label';
      lbl.textContent = 'Workouts';
      content.appendChild(lbl);

      const TAB_DEFS = [
        { key: 'strength', tab: 'Strength', card: 'Strength' },
        { key: 'cardio',   tab: 'Cardio',   card: 'Cardio' },
        { key: 'mobility', tab: 'Mobility', card: 'Mobility & Flexibility' },
      ].filter(t => data.workouts[t.key] && data.workouts[t.key].length);

      const tabBar = document.createElement('div');
      tabBar.className = 'workout-tabs';

      const panels = TAB_DEFS.map(t => {
        const panel = document.createElement('div');
        panel.className = 'workout-panel';
        panel.appendChild(makeWorkoutCard(t.card, data.workouts[t.key]));
        return panel;
      });

      TAB_DEFS.forEach((t, i) => {
        const btn = document.createElement('button');
        btn.className = 'workout-tab' + (i === 0 ? ' active' : '');
        btn.textContent = t.tab;
        btn.addEventListener('click', () => {
          tabBar.querySelectorAll('.workout-tab').forEach((b, j) => b.classList.toggle('active', j === i));
          panels.forEach((p, j) => p.classList.toggle('active', j === i));
        });
        tabBar.appendChild(btn);
      });

      panels[0].classList.add('active');
      content.appendChild(tabBar);
      panels.forEach(p => content.appendChild(p));
    }
  </script>
</body>
